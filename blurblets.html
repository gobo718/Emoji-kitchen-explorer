<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BillyLabs Blurblets</title><link rel="stylesheet" href="profile.css"></head><body><main class="shell"><header class="topbar"><button class="icon-btn" onclick="history.back()">←</button><div class="brand">BillyLabs Blurblets</div><span></span></header><section class="card"><div class="section-title">Top Funny</div><div id="funny" class="ranking-list"></div></section><section class="card" style="margin-top:16px"><div class="section-title">Top Smartest</div><div id="smart" class="ranking-list"></div></section><section class="card" style="margin-top:16px"><div class="section-title">Latest</div><div id="latest" class="ranking-list"></div></section></main><script src="emoji-data.js"></script><script src="profile-data.js"></script><script>const rows=EMOJI_KITCHEN_DATA,d=BILLY_PROFILE_DATA;function row(p){return rows.find(r=>(r[0]===p[0]&&r[1]===p[1])||(r[0]===p[1]&&r[1]===p[0]))||rows.find(r=>p.includes(r[0])||p.includes(r[1]))}function add(id,items){items.forEach(x=>{const r=row(x.pair),a=document.createElement('a');a.className='ranking';a.href=r?'mashup.html?emoji1='+encodeURIComponent(r[0])+'&emoji2='+encodeURIComponent(r[1]):'#';a.innerHTML='<img src="'+(r?r[4]:'')+'"><div><p>“'+x.text+'”</p><small>@'+x.author+' · '+x.pair.join(' + ')+'</small></div><div>›</div>';document.getElementById(id).append(a)})}add('funny',d.blurblets.community);add('smart',[...d.blurblets.community].reverse());add('latest',d.blurblets.community.slice(1).concat(d.blurblets.community[0]));</script></body></html>
