<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#080817">
<meta name="color-scheme" content="dark">
<title>Mashup · Emoji Kitchen Explorer</title>
<style>
:root {
  color-scheme:dark;
  --bg:#050613; --panel:#0f1125; --panel2:#17152e;
  --text:#fff; --muted:#bdb6ca; --accent:#7d53ff; --blue:#1769ff;
  --pink:#ff5cad; --border:#8064c955; --shadow:0 20px 55px #0009;
}
* { box-sizing:border-box; }
html { background:#050613; }
body {
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 0%,#7b2bb53b,transparent 24rem),
    radial-gradient(circle at 85% 10%,#1769ff2e,transparent 26rem),
    linear-gradient(#060714,#03040d 72%);
}
a { color:inherit; }
.shell { max-width:960px; margin:auto; padding:18px 14px 42px; }
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; margin-bottom:16px;
}
.back {
  text-decoration:none; font-weight:850; color:#ded6ff;
}
.brand { font-weight:900; color:#fff; }
.card {
  display:grid;
  grid-template-columns:minmax(260px,.9fr) minmax(260px,1.1fr);
  gap:28px;
  padding:20px;
  border:2px solid transparent;
  border-radius:28px;
  background:
    linear-gradient(var(--panel),var(--panel)) padding-box,
    linear-gradient(100deg,var(--pink),var(--accent),#2c9dff) border-box;
  box-shadow:var(--shadow);
}
.art-wrap {
  display:grid; place-items:center; aspect-ratio:1; border-radius:50%;
  padding:12px;
  background:linear-gradient(135deg,#b34cff,#1b82ff);
  box-shadow:0 0 28px #794dff66;
}
.art-inner {
  width:100%; height:100%; border-radius:50%; overflow:hidden;
  display:grid; place-items:center;
  background:radial-gradient(circle,#3b174e,#17102a);
}
.art-inner img { width:100%; height:100%; object-fit:contain; }
.info { align-self:center; }
.pair { font-size:2.5rem; }
h1 { margin:10px 0 4px; font-size:clamp(1.8rem,6vw,3rem); }
.meta { color:var(--muted); }
.public-blurblet {
  width:62%;
  margin:.75rem auto 0 0;
  text-align:right;
  font-style:italic;
  color:#d8cee3;
}
.public-blurblet[hidden] { display:none; }
.billyism {
  margin-top:12px; color:#c9bfd4; font-size:.78rem;
  font-style:italic;
}
.actions {
  display:grid; grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px; margin-top:20px;
}
button, .action-link {
  min-height:46px; border-radius:14px; border:1px solid var(--border);
  background:var(--panel2); color:var(--text); font:inherit;
  font-weight:850; padding:0 12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; text-decoration:none;
}
.primary { background:linear-gradient(90deg,var(--blue),#3355d7); border:0; }
.secondary { background:linear-gradient(90deg,#6e3bdf,#8d42de); border:0; }
.status {
  min-height:24px; margin-top:12px; color:#8df0b2;
  font-size:.86rem; font-weight:750;
}
.related { margin-top:22px; }
.related h2 { font-size:1.2rem; }
.related-grid {
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px;
}
.related-item {
  border:1px solid var(--border); border-radius:16px; padding:8px;
  background:var(--panel); text-decoration:none; text-align:center;
}
.related-item img { width:100%; aspect-ratio:1; object-fit:contain; }
.related-item div { margin-top:5px; font-size:.85rem; }
.empty { color:var(--muted); }
@media (max-width:720px) {
  .card { grid-template-columns:1fr; }
  .art-wrap { max-width:390px; margin:auto; }
  .info { text-align:center; }
  .related-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}

.site-brand {
  text-align:center;
  padding:8px 0 18px;
}
.site-brand-row {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:14px;
}
.site-brand-icon {
  flex:0 0 auto;
  display:grid;
  place-items:center;
  width:74px;
  height:74px;
  border-radius:22px;
  font-size:2.55rem;
  background:linear-gradient(145deg,#8e55ff,#ff6db2);
  box-shadow:0 0 28px #a54cff44;
}
.site-brand-copy {
  text-align:left;
  line-height:.93;
}
.site-brand-top,
.site-brand-bottom {
  display:block;
  font-size:clamp(2rem,7vw,3.65rem);
  font-weight:950;
  letter-spacing:-.05em;
}
.site-brand-top {
  color:#fff;
}
.site-brand-bottom {
  margin-top:8px;
  background:linear-gradient(90deg,#ff9e72,#ff64bb 48%,#765dff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.site-brand-tagline {
  margin:18px auto 0;
  color:var(--muted);
  font-size:1.03rem;
}
@media (max-width:520px) {
  .site-brand-icon {
    width:62px;
    height:62px;
    font-size:2.1rem;
  }
}


  .emoji-link { color:inherit; text-decoration:none; border-radius:12px; padding:.04em .08em; transition:background .15s ease, transform .15s ease; display:inline-block; }
  .emoji-link:hover,.emoji-link:focus-visible { background:rgba(139,92,255,.18); transform:translateY(-2px); outline:none; }
</style>

<style>
#curatorFab{position:fixed;right:18px;bottom:18px;background:#8b4cff;color:#fff;border:none;border-radius:999px;padding:12px 16px;font-weight:bold;box-shadow:0 8px 24px #0008;cursor:pointer;z-index:9999;transition:opacity .2s,transform .2s}
#curatorFab.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}
#curatorPanel{position:fixed;top:0;right:-390px;width:min(350px,calc(100vw - 28px));height:100%;box-sizing:border-box;background:#111428;border-left:1px solid #7f5cff55;padding:18px;transition:right .3s;z-index:9998;overflow:auto;box-shadow:-16px 0 40px #0008}
#curatorPanel.open{right:0}
.curator-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.curator-head h2{margin:0}
#curatorClose{width:40px;height:40px;border-radius:50%;border:1px solid #ffffff22;background:#1b203b;color:#fff;font-size:1.35rem;cursor:pointer}
#curatorPanel h3{margin:26px 0 12px}
#exhibitList label{display:flex;align-items:center;gap:10px;margin:10px 0;padding:10px;border-radius:10px;background:#ffffff08}
#exhibitList input{width:20px;height:20px;flex:0 0 auto;accent-color:#8b4cff}
#curatorPanel textarea{width:100%;box-sizing:border-box;background:#1b203b;color:#fff;border:1px solid #555b75;padding:10px;border-radius:10px;resize:vertical;font:inherit}
.smallbtn{width:100%;margin:10px 0;padding:11px;border-radius:10px;background:#2d365d;color:#fff;border:none;font-weight:800;cursor:pointer}
.smallbtn.primary{background:linear-gradient(90deg,#6d48ff,#a544ef)}
#curatorStatus{min-height:1.3em;margin:8px 0;color:#8df0b2;font-size:.92rem}
.curator-note{color:#aaaec1;font-size:.86rem;line-height:1.45}
</style>

</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back" href="explorer.html">← Explorer</a>
    <a class="back" href="index.html">Home</a>
  </div>

<header class="site-brand">
  <div class="site-brand-row">
    <div class="site-brand-icon">🧪</div>
    <div class="site-brand-copy">
      <span class="site-brand-top">Emoji Kitchen</span>
      <span class="site-brand-bottom">Explorer ✨</span>
    </div>
  </div>
  <div class="site-brand-tagline">Come see the weird little things Google made.</div>
</header>

  <main id="loading" class="empty">Finding that mashup…</main>

  <main id="content" hidden>
    <section class="card">
      <div class="art-wrap">
        <div class="art-inner">
          <img id="image" alt="">
        </div>
      </div>

      <div class="info">
        <div class="pair" id="pair"></div>
        <h1 id="title"></h1>
        <div class="meta" id="release"></div>
        <div class="billyism" id="billyism" hidden></div>

        <div class="actions">
          <button class="primary" id="copyImage" type="button">📋 Copy image</button>
          <button id="copyPair" type="button">😀 Copy emojis</button>
          <button class="secondary" id="copyLink" type="button">🔗 Copy link</button>
          <button id="favorite" type="button">☆ Favorite</button>
        </div>
        <div class="public-blurblet" id="publicBlurblet" hidden></div>
        <div class="status" id="status" aria-live="polite"></div>
      </div>
    </section>

    <section class="related">
      <h2>Related mashups</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </section>
  </main>
</div>

<script src="emoji-data.js"></script>
<script src="billyisms.js"></script>
<script src="hidden-categories.js"></script>
<script src="achievements.js"></script>
<script>
(() => {
  const all = window.EMOJI_KITCHEN_DATA || [];
  const notes = window.BILLYISMS || {};
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const left = params.get("left") || "";
  const right = params.get("right") || "";
  const keyOf = row => row[0] + "|" + row[1] + "|" + row[3];
  const favorites = new Set(JSON.parse(localStorage.getItem("ek-favorites") || "[]"));
  const seen = new Set(JSON.parse(localStorage.getItem("ek-seen") || "[]"));

  const prettyDate = s => `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const prettyName = s => s
    .replace(/_/g," ")
    .replace(/\s*\+\s*/g," + ")
    .replace(/\b\w/g,c=>c.toUpperCase());

  function findRow() {
    return all.find(row =>
      (row[0] === left && row[1] === right) ||
      (row[0] === right && row[1] === left)
    );
  }

  function noteFor(a,b) {
    return notes[a+b] || notes[b+a] || "";
  }

  function say(message, error=false) {
    $("status").textContent = message;
    $("status").style.color = error ? "#ff9a9a" : "#8df0b2";
  }

  const row = findRow();
  if (!row) {
    $("loading").textContent = "That mashup could not be found.";
    return;
  }

  const key = keyOf(row);
  seen.add(key);
  localStorage.setItem("ek-seen", JSON.stringify([...seen]));

  $("image").src = row[4];
  $("image").alt = `${row[0]} plus ${row[1]} Emoji Kitchen mashup`;
  $("pair").innerHTML = `<a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[0])}" aria-label="Explore ${row[0]}">${row[0]}</a> + <a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[1])}" aria-label="Explore ${row[1]}">${row[1]}</a>`;
  $("title").textContent = prettyName(row[2]);
  $("release").textContent = `Released ${prettyDate(row[3])}`;
  const curatorPairKey = [row[0], row[1]].sort().join("|");
  const curatorEntries = (() => {
    try { return JSON.parse(localStorage.getItem("billy-curator-entries-v1") || "{}"); }
    catch { return {}; }
  })();
  const publicBlurblet = curatorEntries[curatorPairKey]?.blurblet?.trim() || "";
  if (publicBlurblet) {
    $("publicBlurblet").textContent = publicBlurblet;
    $("publicBlurblet").hidden = false;
  }
  document.title = `${row[0]} + ${row[1]} · Emoji Kitchen Explorer`;

  const note = noteFor(row[0],row[1]);
  if (note) {
    $("billyism").textContent = note;
    $("billyism").hidden = false;
  }

  function updateFavorite() {
    $("favorite").textContent = favorites.has(key) ? "★ Favorited" : "☆ Favorite";
  }
  updateFavorite();

  $("favorite").addEventListener("click", () => {
    favorites.has(key) ? favorites.delete(key) : favorites.add(key);
    localStorage.setItem("ek-favorites", JSON.stringify([...favorites]));
    updateFavorite();
    say(favorites.has(key) ? "Added to favorites." : "Removed from favorites.");
  });

  $("copyPair").addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(`${row[0]} + ${row[1]}`);
      say("Emoji pair copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyLink").addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(location.href);
      say("Page link copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyImage").addEventListener("click", async () => {
    try {
      if (!navigator.clipboard || !window.ClipboardItem) {
        throw new Error("Image clipboard unavailable");
      }
      const response = await fetch(row[4], {mode:"cors"});
      if (!response.ok) throw new Error("Could not fetch image");
      const blob = await response.blob();
      const pngBlob = blob.type === "image/png"
        ? blob
        : await createImageBitmap(blob).then(bitmap => {
            const canvas = document.createElement("canvas");
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            canvas.getContext("2d").drawImage(bitmap,0,0);
            return new Promise(resolve => canvas.toBlob(resolve,"image/png"));
          });
      await navigator.clipboard.write([new ClipboardItem({"image/png": pngBlob})]);
      say("Image copied. Paste it wherever images are supported.");
    } catch (error) {
      try {
        await navigator.clipboard.writeText(row[4]);
        say("Direct image copying was blocked, so the image link was copied instead.");
      } catch {
        say("Your browser blocked image copying. Press and hold the image to save or share it.", true);
      }
    }
  });

  const related = all
    .filter(other =>
      (other[0] === row[0] || other[1] === row[0] ||
       other[0] === row[1] || other[1] === row[1]) &&
      keyOf(other) !== key
    )
    .slice(0,8);

  $("relatedGrid").innerHTML = related.map(item => `
    <a class="related-item"
       href="mashup.html?left=${encodeURIComponent(item[0])}&right=${encodeURIComponent(item[1])}">
      <img loading="lazy" src="${item[4]}" alt="${item[0]} plus ${item[1]} mashup">
      <div>${item[0]} + ${item[1]}</div>
    </a>
  `).join("");

  $("loading").hidden = true;
  $("content").hidden = false;
})();
</script>



<button id="curatorFab" type="button">🔬 Curator</button>
<aside id="curatorPanel" aria-hidden="true" aria-label="Billy Labs Curator">
  <div class="curator-head">
    <h2>🔬 Billy Labs Curator</h2>
    <button id="curatorClose" type="button" aria-label="Close Curator">×</button>
  </div>
  <p class="curator-note">Saved privately in this browser on this device.</p>
  <h3>Exhibits</h3>
  <div id="exhibitList"></div>
  <button id="createExhibit" class="smallbtn" type="button">➕ Create New Exhibit</button>
  <h3>Blurblet</h3>
  <textarea id="curatorBlurblet" rows="4" placeholder="Write a Billy Labs Blurblet..."></textarea>
  <h3>Curator Notes</h3>
  <textarea id="curatorNotes" rows="6" placeholder="Private research notes..."></textarea>
  <button id="curatorSave" class="smallbtn primary" type="button">💾 Save Curator Entry</button>
  <div id="curatorStatus" aria-live="polite"></div>
  <a class="smallbtn" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box" href="curator/">Open Curator Dashboard →</a>
</aside>
<script>
(() => {
  const fab = document.getElementById('curatorFab');
  const panel = document.getElementById('curatorPanel');
  const close = document.getElementById('curatorClose');
  const list = document.getElementById('exhibitList');
  const blurblet = document.getElementById('curatorBlurblet');
  const notes = document.getElementById('curatorNotes');
  const save = document.getElementById('curatorSave');
  const create = document.getElementById('createExhibit');
  const status = document.getElementById('curatorStatus');

  const DEFAULT_EXHIBITS = ['🧬 Mutations','🍽️ Forbidden Foods','👁️ Extra Eyes','👑 Unexpected Royalty'];
  const EXHIBIT_KEY = 'billy-curator-exhibits-v1';
  const ENTRY_KEY = 'billy-curator-entries-v1';
  const params = new URLSearchParams(location.search);
  const pairKey = [params.get('left') || '', params.get('right') || ''].sort().join('|');

  const readJson = (key, fallback) => {
    try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
    catch { return fallback; }
  };
  const getExhibits = () => {
    const custom = readJson(EXHIBIT_KEY, []);
    return [...new Set([...DEFAULT_EXHIBITS, ...custom])];
  };
  const getEntries = () => readJson(ENTRY_KEY, {});

  function renderExhibits(selected = []) {
    list.innerHTML = '';
    getExhibits().forEach(name => {
      const label = document.createElement('label');
      const box = document.createElement('input');
      box.type = 'checkbox';
      box.value = name;
      box.checked = selected.includes(name);
      label.append(box, document.createTextNode(name));
      list.appendChild(label);
    });
  }

  function loadEntry() {
    const entry = getEntries()[pairKey] || {};
    renderExhibits(entry.exhibits || []);
    blurblet.value = entry.blurblet || '';
    notes.value = entry.notes || '';
    const pub = document.getElementById('publicBlurblet');
    const text = (entry.blurblet || '').trim();
    pub.textContent = text;
    pub.hidden = !text;
    status.textContent = entry.updatedAt ? `Last saved ${new Date(entry.updatedAt).toLocaleString()}` : '';
  }

  function setOpen(open) {
    panel.classList.toggle('open', open);
    fab.classList.toggle('hidden', open);
    panel.setAttribute('aria-hidden', String(!open));
    if (open) blurblet.focus({preventScroll:true});
  }

  fab.addEventListener('click', () => setOpen(true));
  close.addEventListener('click', () => setOpen(false));
  document.addEventListener('keydown', event => { if (event.key === 'Escape') setOpen(false); });

  create.addEventListener('click', () => {
    const raw = prompt('Name the new exhibit (emoji optional):');
    const name = raw && raw.trim();
    if (!name) return;
    const custom = readJson(EXHIBIT_KEY, []);
    if (!getExhibits().includes(name)) {
      custom.push(name);
      localStorage.setItem(EXHIBIT_KEY, JSON.stringify(custom));
    }
    const selected = [...list.querySelectorAll('input:checked')].map(input => input.value);
    selected.push(name);
    renderExhibits([...new Set(selected)]);
    status.textContent = `Created “${name}”. Save the entry to keep this assignment.`;
  });

  save.addEventListener('click', () => {
    if (!pairKey.replace('|','')) {
      status.textContent = 'This mashup could not be identified.';
      return;
    }
    const entries = getEntries();
    entries[pairKey] = {
      left: params.get('left') || '',
      right: params.get('right') || '',
      exhibits: [...list.querySelectorAll('input:checked')].map(input => input.value),
      blurblet: blurblet.value.trim(),
      notes: notes.value.trim(),
      updatedAt: new Date().toISOString()
    };
    localStorage.setItem(ENTRY_KEY, JSON.stringify(entries));
    const pub = document.getElementById('publicBlurblet');
    const text = entries[pairKey].blurblet;
    pub.textContent = text;
    pub.hidden = !text;
    status.textContent = 'Saved on this device. ✓';
  });

  loadEntry();
})();
</script>

</body>
