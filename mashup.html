<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#080817">
<meta name="color-scheme" content="dark">
<title>Mashup · Emoji Kitchen Explorer</title>
<style>
:root {
  color-scheme:dark;
  --bg:#050613; --panel:#0f1125; --panel2:#17152e;
  --text:#fff; --muted:#bdb6ca; --accent:#7d53ff; --blue:#1769ff;
  --pink:#ff5cad; --border:#8064c955; --shadow:0 20px 55px #0009;
}
* { box-sizing:border-box; }
html { background:#050613; }
body {
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 0%,#7b2bb53b,transparent 24rem),
    radial-gradient(circle at 85% 10%,#1769ff2e,transparent 26rem),
    linear-gradient(#060714,#03040d 72%);
}
a { color:inherit; }
.shell { max-width:960px; margin:auto; padding:18px 14px 42px; }
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; margin-bottom:16px;
}
.back {
  text-decoration:none; font-weight:850; color:#ded6ff;
}
.brand { font-weight:900; color:#fff; }
.card {
  display:grid;
  grid-template-columns:minmax(260px,.9fr) minmax(260px,1.1fr);
  gap:28px;
  padding:20px;
  border:2px solid transparent;
  border-radius:28px;
  background:
    linear-gradient(var(--panel),var(--panel)) padding-box,
    linear-gradient(100deg,var(--pink),var(--accent),#2c9dff) border-box;
  box-shadow:var(--shadow);
}
.art-wrap {
  display:grid; place-items:center; aspect-ratio:1; border-radius:50%;
  padding:12px;
  background:linear-gradient(135deg,#b34cff,#1b82ff);
  box-shadow:0 0 28px #794dff66;
}
.art-inner {
  width:100%; height:100%; border-radius:50%; overflow:hidden;
  display:grid; place-items:center;
  background:radial-gradient(circle,#3b174e,#17102a);
}
.art-inner img { width:100%; height:100%; object-fit:contain; }
.info { align-self:center; }
.pair { font-size:2.5rem; }
h1 { margin:10px 0 4px; font-size:clamp(1.8rem,6vw,3rem); }
.meta { color:var(--muted); }
.public-blurblet {
  width:62%;
  margin:.75rem auto 0 0;
  text-align:right;
  font-style:italic;
  color:#d8cee3;
}
.public-blurblet[hidden] { display:none; }
.billyism {
  margin-top:12px; color:#c9bfd4; font-size:.78rem;
  font-style:italic;
}
.actions {
  display:grid; grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px; margin-top:20px;
}
.button-icon { flex:0 0 auto; }
.button-label { display:inline-block; white-space:nowrap; }
.copy-feedback-button { min-width:0; }
.copy-feedback-button:disabled { cursor:default; opacity:1; }
.action-blurblet {
  max-width:100%;
  white-space:normal;
  overflow-wrap:anywhere;
}
button, .action-link {
  min-height:46px; border-radius:14px; border:1px solid var(--border);
  background:var(--panel2); color:var(--text); font:inherit;
  font-weight:850; padding:0 12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; text-decoration:none;
}
.primary { background:linear-gradient(90deg,var(--blue),#3355d7); border:0; }
.emoji-action { background:linear-gradient(90deg,#ff64bb,#d83cff); border:0; }
.secondary { background:linear-gradient(90deg,#6e3bdf,#8d42de); border:0; }
.favorite-action { background:linear-gradient(90deg,#ff9e72,#ff6d61); border:0; }
.status {
  min-height:24px; margin-top:12px; color:#8df0b2;
  font-size:.86rem; font-weight:750;
}
.empty { color:var(--muted); }
@media (max-width:720px) {
  .card { grid-template-columns:1fr; }
  .art-wrap { max-width:390px; margin:auto; }
  .info { text-align:center; }
}

.site-brand {
  text-align:center;
  padding:8px 0 18px;
}
.site-brand-row {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:14px;
}
.site-brand-icon {
  flex:0 0 auto;
  display:grid;
  place-items:center;
  width:74px;
  height:74px;
  border-radius:22px;
  font-size:2.55rem;
  background:linear-gradient(145deg,#8e55ff,#ff6db2);
  box-shadow:0 0 28px #a54cff44;
}
.site-brand-copy {
  text-align:left;
  line-height:.93;
}
.site-brand-top,
.site-brand-bottom {
  display:block;
  font-size:clamp(2rem,7vw,3.65rem);
  font-weight:950;
  letter-spacing:-.05em;
}
.site-brand-top {
  color:#fff;
}
.site-brand-bottom {
  margin-top:8px;
  background:linear-gradient(90deg,#ff9e72,#ff64bb 48%,#765dff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.site-brand-tagline {
  margin:18px auto 0;
  color:var(--muted);
  font-size:1.03rem;
}
@media (max-width:520px) {
  .site-brand-icon {
    width:62px;
    height:62px;
    font-size:2.1rem;
  }
}


  .emoji-link { color:inherit; text-decoration:none; border-radius:12px; padding:.04em .08em; transition:background .15s ease, transform .15s ease; display:inline-block; }
  .emoji-link:hover,.emoji-link:focus-visible { background:rgba(139,92,255,.18); transform:translateY(-2px); outline:none; }

.discovery-nav { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; margin:0 0 16px; }
.discovery-nav strong { text-align:center; }
.discovery-right{justify-self:end;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.discovery-right button{white-space:nowrap}
.discovery-nav button { border:1px solid #ffffff26; border-radius:14px; padding:12px 14px; background:#17152e; color:#fff; font-weight:850; cursor:pointer; }
.discovery-nav button:last-child { justify-self:end; }
.discovery-nav button:disabled { opacity:.4; cursor:default; }
@media (max-width:700px) { .discovery-nav { grid-template-columns:1fr; } .discovery-nav>span{display:none}.discovery-right{justify-self:stretch;display:grid;grid-template-columns:1fr 1fr}.discovery-nav button{width:100%} }
</style>

<style>
#curatorFab{position:fixed;right:18px;bottom:84px;background:#8b4cff;color:#fff;border:none;border-radius:999px;padding:12px 16px;font-weight:bold;box-shadow:0 8px 24px #0008;cursor:pointer;z-index:9999;transition:opacity .2s,transform .2s}
#curatorFab.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}
#curatorPanel{position:fixed;top:0;right:-390px;width:min(350px,calc(100vw - 28px));height:100%;box-sizing:border-box;background:#111428;border-left:1px solid #7f5cff55;padding:18px;transition:right .3s;z-index:9998;overflow:auto;box-shadow:-16px 0 40px #0008}
#curatorPanel.open{right:0}
.curator-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.curator-head h2{margin:0}
#curatorClose{width:40px;height:40px;border-radius:50%;border:1px solid #ffffff22;background:#1b203b;color:#fff;font-size:1.35rem;cursor:pointer}
#curatorPanel h3{margin:26px 0 12px}
#exhibitList label{display:flex;align-items:center;gap:10px;margin:10px 0;padding:10px;border-radius:10px;background:#ffffff08}
#exhibitList input{width:20px;height:20px;flex:0 0 auto;accent-color:#8b4cff}
#curatorPanel textarea{width:100%;box-sizing:border-box;background:#1b203b;color:#fff;border:1px solid #555b75;padding:10px;border-radius:10px;resize:vertical;font:inherit}
.smallbtn{width:100%;margin:10px 0;padding:11px;border-radius:10px;background:#2d365d;color:#fff;border:none;font-weight:800;cursor:pointer}
.smallbtn.primary{background:linear-gradient(90deg,#6d48ff,#a544ef)}
#curatorStatus{min-height:1.3em;margin:8px 0;color:#8df0b2;font-size:.92rem}
.curator-note{color:#aaaec1;font-size:.86rem;line-height:1.45}
</style>

</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back" href="index.html">← Home</a>
  </div>

<header class="site-brand">
  <div class="site-brand-row">
    <div class="site-brand-icon">🧪</div>
    <div class="site-brand-copy">
      <span class="site-brand-top">Emoji Kitchen</span>
      <span class="site-brand-bottom">Explorer ✨</span>
    </div>
  </div>

  <main id="content" hidden>
    <nav class="discovery-nav" id="discoveryNav" aria-label="Mashup navigation">
      <button id="viewInCollection" type="button">← View in My Collection</button>
      <span></span>

      <div class="art-wrap">

          <img id="image" alt="">
        </div>

      <div class="info">
        <div class="pair" id="pair"></div>

        <div class="actions">
          <button class="primary copy-feedback-button" id="copyImage" type="button"><span class="button-icon" aria-hidden="true">📋</span><span class="button-label">Copy image</span></button>
          <button class="emoji-action copy-emojis-button copy-feedback-button" id="copyPair" type="button"><span class="button-icon" aria-hidden="true">😀</span><span class="button-label">Copy emojis</span></button>
          <button class="secondary copy-feedback-button" id="copyLink" type="button"><span class="button-icon" aria-hidden="true">🔗</span><span class="button-label">Copy link</span></button>

        <div class="public-blurblet action-blurblet" id="publicBlurblet" hidden></div>

  </main>
</div>

<script>
(() => {
  const all = window.EMOJI_KITCHEN_DATA || [];
  const notes = window.BILLYISMS || {};
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const [left, right] = BillyMashups.pairFromSearch(params);
  const keyOf = row => BillyMashups.rowId(row);

  const prettyDate = s => `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const prettyName = s => s
    .replace(/_/g," ")
    .replace(/\s*\+\s*/g," + ")
    .replace(/\b\w/g,c=>c.toUpperCase());

  const findRow = () => BillyMashups.resolve(all, left, right);

  function noteFor(a,b) {
    return notes[a+b] || notes[b+a] || "";
  }

  function say(message, error=false) {
    $("status").textContent = message;
    $("status").style.color = error ? "#ff9a9a" : "#8df0b2";
  }

  const row = findRow();
  if (!row) {
    $("loading").textContent = "That mashup could not be found.";
    return;
  }

  const key = keyOf(row);
  BillyProgress.markSeen(row[0], row[1]);

  $("image").src = row[4];
  $("image").alt = `${row[0]} plus ${row[1]} Emoji Kitchen mashup`;
  $("pair").innerHTML = `<a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[0])}" aria-label="Explore ${row[0]}">${row[0]}</a> + <a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[1])}" aria-label="Explore ${row[1]}">${row[1]}</a>`;
  $("title").textContent = prettyName(row[2]);
  $("release").textContent = `Released ${prettyDate(row[3])}`;
  const curatorPairKey = BillyMashups.id(row[0], row[1]);
  const curatorEntries = (() => {
    try { return BillyCuratorData.list(); }
    catch { return {}; }
  })();
  const publicBlurblet = curatorEntries[curatorPairKey]?.blurblet?.trim() || "";
  if (publicBlurblet) {
    $("publicBlurblet").textContent = publicBlurblet;
    $("publicBlurblet").hidden = false;
  }
  if (window.BillyCloudApi?.isConfigured?.()) {
    BillyCloudApi.getPublishedBlurblet(curatorPairKey).then(result => {
      const text = String(result?.text || '').trim();
      if (text || result?.publishedAt) {
        $("publicBlurblet").textContent = text;
        $("publicBlurblet").hidden = !text;
      }
    }).catch(() => {});
  }
  document.title = `${row[0]} + ${row[1]} · Emoji Kitchen Explorer`;

  const note = noteFor(row[0],row[1]);
  if (note) {
    $("billyism").textContent = note;
    $("billyism").hidden = false;
  }

  function updateFavorite() {
    const active = BillyProgress.isFavorite(row[0], row[1]);
    const button = $("favorite");
    button.querySelector(".button-icon").textContent = active ? "★" : "☆";
    button.querySelector(".button-label").textContent = active ? "Favorited" : "Favorite";
    button.setAttribute("aria-pressed", String(active));
    BillyActionUI.alignBlurblet(button.closest(".info"));
  }
  updateFavorite();

  $("favorite").addEventListener("click", () => {
    const active = BillyProgress.toggleFavorite(row[0], row[1]);
    updateFavorite();
    say(active ? "Added to favorites." : "Removed from favorites.");
  });

  $("copyPair").addEventListener("click", async () => {
    try {
      await BillyActionUI.runCopyFeedback($("copyPair"), () => navigator.clipboard.writeText(`${row[0]} + ${row[1]}`));
      say("Emojis copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyLink").addEventListener("click", async () => {
    try {
      await BillyActionUI.runCopyFeedback($("copyLink"), () => navigator.clipboard.writeText(location.href));
      say("Link copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyImage").addEventListener("click", async () => {
    try {
      if (!navigator.clipboard || !window.ClipboardItem) {
        throw new Error("Image clipboard unavailable");
      }
      const response = await fetch(row[4], {mode:"cors"});
      if (!response.ok) throw new Error("Could not fetch image");
      const blob = await response.blob();
      const pngBlob = blob.type === "image/png"
        ? blob
        : await createImageBitmap(blob).then(bitmap => {
            const canvas = document.createElement("canvas");
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            canvas.getContext("2d").drawImage(bitmap,0,0);
            return new Promise(resolve => canvas.toBlob(resolve,"image/png"));
          });
      await BillyActionUI.runCopyFeedback($("copyImage"), () => navigator.clipboard.write([new ClipboardItem({"image/png": pngBlob})]));
      say("Image copied. Paste it wherever images are supported.");
    } catch (error) {
      try {
        await navigator.clipboard.writeText(row[4]);
        say("Direct image copying was blocked, so the image link was copied instead.");
      } catch {
        say("Your browser blocked image copying. Press and hold the image to save or share it.", true);
      }
    }
  });




  const mode = params.get("mode") || "";
  const goTo = (target, extras) => {
    const base = BillyMashups.buildUrl(target);
    location.href = base + (base.includes("?") ? "&" : "?") + extras;
  };
  $("viewInCollection").onclick = () => {
    location.href = `collection-book.html?emoji=${encodeURIComponent(row[0])}&pair=${encodeURIComponent(key)}#mashup-${encodeURIComponent(key)}`;
  };
  $("surpriseDiscovery").onclick = () => {
    const seenNow = BillyProgress.getSeen();
    const target = BillyDiscovery.selectRandom(all, {
      preferUnseen: true,
      seenIds: seenNow,
      excludeIds: [key],
      idOf: keyOf
    }) || row;
    goTo(target,"mode=surprise");
  };
  $("newlyDiscovery").onclick = () => {
    const newest = BillyDiscovery.selectNewest(all);
    const seed = BillyDiscovery.createSeed();
    const target = newest.row || row;
    goTo(target,`mode=newly&date=${encodeURIComponent(newest.date)}&seed=${seed}`);
  };

  $("loading").hidden = true;
  $("content").hidden = false;
  BillyActionUI.observeBlurblet($("favorite").closest(".info"));
})();
</script>



<button id="curatorFab" type="button">🔬 Curator</button>
<aside id="curatorPanel" aria-hidden="true" aria-label="Billy Labs Curator">
<div class="curator-head"><h2>🔬 Billy Labs Curator</h2><button id="curatorClose" type="button" aria-label="Close Curator">×</button></div>
<p class="curator-note">Edit private collection drafts here. Nothing goes public until you publish it from the Curator dashboard.</p>
<h3>Collection drafts</h3><div id="exhibitList"></div>
<button id="createExhibit" class="smallbtn" type="button">➕ New Collection with This Mashup</button>
<h3>Blurblet</h3><textarea id="curatorBlurblet" rows="4" placeholder="Write a public Billy Labs Blurblet..."></textarea>
<h3>Curator Notes</h3><textarea id="curatorNotes" rows="5" placeholder="Private research notes..."></textarea>
<button id="curatorSave" class="smallbtn primary" type="button">💾 Save Mashup & Draft Memberships</button>
<button id="curatorPublishBlurblet" class="smallbtn" type="button">📝 Update Blurblet Only</button>
<div id="curatorStatus" aria-live="polite"></div>
</aside>
<script>
(()=>{const $=id=>document.getElementById(id),fab=$('curatorFab'),panel=$('curatorPanel'),list=$('exhibitList'),status=$('curatorStatus');const params=new URLSearchParams(location.search),host=location.hostname.toLowerCase(),explicit=params.get('curator')==='1';if(explicit){try{localStorage.setItem('billyLabsCuratorMode','1')}catch{}}const remembered=(()=>{try{return localStorage.getItem('billyLabsCuratorMode')==='1'}catch{return false}})(),curatorEnabled=explicit||remembered||host==='localhost'||host==='127.0.0.1'||host.endsWith('.local')||host.includes('dev')||host.includes('staging')||host==='gobo718.github.io';if(!curatorEnabled){fab.remove();panel.remove();return;}const [left,right]=BillyMashups.pairFromSearch(params),pairKey=BillyMashups.id(left,right);const drafts=()=>BillyCuratorData.draftList();
function collections(){return BillyCollections.list()}function render(){const selected=new Set(collections().filter(c=>(c.draft?.members||[]).includes(pairKey)).map(c=>c.id));list.innerHTML=collections().map(c=>`<label><input type="checkbox" value="${c.id}" ${selected.has(c.id)?'checked':''}> ${c.icon} ${c.name} <small>(${c.status==='published'?'published + draft':'draft'})</small></label>`).join('')||'<p class="curator-note">No collections yet.</p>';const e=drafts()[pairKey]||BillyCuratorData.get(pairKey)||{};$('curatorBlurblet').value=e.blurblet||'';$('curatorNotes').value=(drafts()[pairKey]||{}).notes||''}
function open(v){panel.classList.toggle('open',v);fab.classList.toggle('hidden',v);panel.setAttribute('aria-hidden',String(!v))}fab.onclick=()=>{render();open(true)};$('curatorClose').onclick=()=>open(false);document.addEventListener('keydown',e=>{if(e.key==='Escape')open(false)});
$('createExhibit').onclick=()=>{const raw=prompt('Name the new collection:');if(!raw?.trim())return;const rows=collections(),c=BillyCollections.blank(raw.trim(),'🗂️');c.draft.members=[pairKey];rows.push(c);BillyCollections.save(rows);render();status.textContent=`Created “${c.name}” as a private draft with this mashup as member #1.`};
function saveCurrentDraft(){const rows=collections(),checked=new Set([...list.querySelectorAll('input:checked')].map(x=>x.value));rows.forEach(c=>{c.draft=c.draft||{members:[]};const set=new Set(c.draft.members||[]);checked.has(c.id)?set.add(pairKey):set.delete(pairKey);c.draft.members=[...set];c.updatedAt=new Date().toISOString()});BillyCollections.save(rows);BillyCuratorData.save(pairKey,{left,right,blurblet:$('curatorBlurblet').value.trim(),notes:$('curatorNotes').value.trim(),updatedAt:new Date().toISOString()});}
$('curatorSave').onclick=()=>{saveCurrentDraft();status.textContent='Draft saved. Nothing public changed.'};
$('curatorPublishBlurblet').onclick=async()=>{saveCurrentDraft();const published=BillyCuratorData.publishBlurblet(pairKey),text=published?.blurblet||'';const pub=$('publicBlurblet');pub.textContent=text;pub.hidden=!text;if(window.BillyCloudApi?.isConfigured?.()){let key=localStorage.getItem('billy-curator-publish-key')||'';if(!key){key=prompt('Enter the Curator publish key. It stays in this browser only.')||'';if(key)localStorage.setItem('billy-curator-publish-key',key);}if(!key){status.textContent='Cloud publish cancelled. The local published copy is still saved.';return;}status.textContent='Publishing blurblet…';try{await BillyCloudApi.publishBlurblet(pairKey,text,key);status.textContent='Blurblet published live. Collection drafts were not published.';return;}catch(error){status.textContent=`Live publish failed: ${error.message}. Downloading the manual fallback file.`;}}BillyCuratorData.downloadPublishedScript();};})();
</script>
