<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#080817">
<meta name="color-scheme" content="dark">
<title>Mashup · Emoji Kitchen Explorer</title>
<style>
:root {
  color-scheme:dark;
  --bg:#050613; --panel:#0f1125; --panel2:#17152e;
  --text:#fff; --muted:#bdb6ca; --accent:#7d53ff; --blue:#1769ff;
  --pink:#ff5cad; --border:#8064c955; --shadow:0 20px 55px #0009;
}
* { box-sizing:border-box; }
html { background:#050613; }
body {
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 0%,#7b2bb53b,transparent 24rem),
    radial-gradient(circle at 85% 10%,#1769ff2e,transparent 26rem),
    linear-gradient(#060714,#03040d 72%);
}
a { color:inherit; }
.shell { max-width:960px; margin:auto; padding:18px 14px 42px; }
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; margin-bottom:16px;
}
.back {
  text-decoration:none; font-weight:850; color:#ded6ff;
}
.brand { font-weight:900; color:#fff; }
.card {
  display:grid;
  grid-template-columns:minmax(260px,.9fr) minmax(260px,1.1fr);
  gap:28px;
  padding:20px;
  border:2px solid transparent;
  border-radius:28px;
  background:
    linear-gradient(var(--panel),var(--panel)) padding-box,
    linear-gradient(100deg,var(--pink),var(--accent),#2c9dff) border-box;
  box-shadow:var(--shadow);
}
.art-wrap {
  display:grid; place-items:center; aspect-ratio:1; border-radius:50%;
  padding:12px;
  background:linear-gradient(135deg,#b34cff,#1b82ff);
  box-shadow:0 0 28px #794dff66;
}
.art-inner {
  width:100%; height:100%; border-radius:50%; overflow:hidden;
  display:grid; place-items:center;
  background:radial-gradient(circle,#3b174e,#17102a);
}
.art-inner img { width:100%; height:100%; object-fit:contain; }
.info { align-self:center; }
.pair { font-size:2.5rem; }
h1 { margin:10px 0 4px; font-size:clamp(1.8rem,6vw,3rem); }
.meta { color:var(--muted); }
.billyism {
  margin-top:12px; color:#c9bfd4; font-size:.78rem;
  font-style:italic;
}
.actions {
  display:grid; grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px; margin-top:20px;
}
button, .action-link {
  min-height:46px; border-radius:14px; border:1px solid var(--border);
  background:var(--panel2); color:var(--text); font:inherit;
  font-weight:850; padding:0 12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; text-decoration:none;
}
.primary { background:linear-gradient(90deg,var(--blue),#3355d7); border:0; }
.secondary { background:linear-gradient(90deg,#6e3bdf,#8d42de); border:0; }
.status {
  min-height:24px; margin-top:12px; color:#8df0b2;
  font-size:.86rem; font-weight:750;
}
.related { margin-top:22px; }
.related h2 { font-size:1.2rem; }
.related-grid {
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px;
}
.related-item {
  border:1px solid var(--border); border-radius:16px; padding:8px;
  background:var(--panel); text-decoration:none; text-align:center;
}
.related-item img { width:100%; aspect-ratio:1; object-fit:contain; }
.related-item div { margin-top:5px; font-size:.85rem; }
.empty { color:var(--muted); }
@media (max-width:720px) {
  .card { grid-template-columns:1fr; }
  .art-wrap { max-width:390px; margin:auto; }
  .info { text-align:center; }
  .related-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}

.site-brand {
  text-align:center;
  padding:8px 0 18px;
}
.site-brand-row {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:14px;
}
.site-brand-icon {
  flex:0 0 auto;
  display:grid;
  place-items:center;
  width:74px;
  height:74px;
  border-radius:22px;
  font-size:2.55rem;
  background:linear-gradient(145deg,#8e55ff,#ff6db2);
  box-shadow:0 0 28px #a54cff44;
}
.site-brand-copy {
  text-align:left;
  line-height:.93;
}
.site-brand-top,
.site-brand-bottom {
  display:block;
  font-size:clamp(2rem,7vw,3.65rem);
  font-weight:950;
  letter-spacing:-.05em;
}
.site-brand-top {
  color:#fff;
}
.site-brand-bottom {
  margin-top:8px;
  background:linear-gradient(90deg,#ff9e72,#ff64bb 48%,#765dff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.site-brand-tagline {
  margin:18px auto 0;
  color:var(--muted);
  font-size:1.03rem;
}
@media (max-width:520px) {
  .site-brand-icon {
    width:62px;
    height:62px;
    font-size:2.1rem;
  }
}


  .emoji-link { color:inherit; text-decoration:none; border-radius:12px; padding:.04em .08em; transition:background .15s ease, transform .15s ease; display:inline-block; }
  .emoji-link:hover,.emoji-link:focus-visible { background:rgba(139,92,255,.18); transform:translateY(-2px); outline:none; }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back" href="explorer.html">← Explorer</a>
    <a class="back" href="index.html">Home</a>
  </div>

<header class="site-brand">
  <div class="site-brand-row">
    <div class="site-brand-icon">🧪</div>
    <div class="site-brand-copy">
      <span class="site-brand-top">Emoji Kitchen</span>
      <span class="site-brand-bottom">Explorer ✨</span>
    </div>
  </div>
  <div class="site-brand-tagline">Come see the weird little things Google made.</div>
</header>

  <main id="loading" class="empty">Finding that mashup…</main>

  <main id="content" hidden>
    <section class="card">
      <div class="art-wrap">
        <div class="art-inner">
          <img id="image" alt="">
        </div>
      </div>

      <div class="info">
        <div class="pair" id="pair"></div>
        <h1 id="title"></h1>
        <div class="meta" id="release"></div>
        <div class="billyism" id="billyism" hidden></div>

        <div class="actions">
          <button class="primary" id="copyImage" type="button">📋 Copy image</button>
          <button id="copyPair" type="button">😀 Copy emojis</button>
          <button class="secondary" id="copyLink" type="button">🔗 Copy link</button>
          <button id="favorite" type="button">☆ Favorite</button>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
      </div>
    </section>

    <section class="related">
      <h2>Related mashups</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </section>
  </main>
</div>

<script src="emoji-data.js"></script>
<script src="billyisms.js"></script>
<script src="hidden-categories.js"></script>
<script src="achievements.js"></script>
<script>
(() => {
  const all = window.EMOJI_KITCHEN_DATA || [];
  const notes = window.BILLYISMS || {};
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const left = params.get("left") || "";
  const right = params.get("right") || "";
  const keyOf = row => row[0] + "|" + row[1] + "|" + row[3];
  const favorites = new Set(JSON.parse(localStorage.getItem("ek-favorites") || "[]"));
  const seen = new Set(JSON.parse(localStorage.getItem("ek-seen") || "[]"));

  const prettyDate = s => `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const prettyName = s => s
    .replace(/_/g," ")
    .replace(/\s*\+\s*/g," + ")
    .replace(/\b\w/g,c=>c.toUpperCase());

  function findRow() {
    return all.find(row =>
      (row[0] === left && row[1] === right) ||
      (row[0] === right && row[1] === left)
    );
  }

  function noteFor(a,b) {
    return notes[a+b] || notes[b+a] || "";
  }

  function say(message, error=false) {
    $("status").textContent = message;
    $("status").style.color = error ? "#ff9a9a" : "#8df0b2";
  }

  const row = findRow();
  if (!row) {
    $("loading").textContent = "That mashup could not be found.";
    return;
  }

  const key = keyOf(row);
  seen.add(key);
  localStorage.setItem("ek-seen", JSON.stringify([...seen]));

  $("image").src = row[4];
  $("image").alt = `${row[0]} plus ${row[1]} Emoji Kitchen mashup`;
  $("pair").innerHTML = `<a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[0])}" aria-label="Explore ${row[0]}">${row[0]}</a> + <a class="emoji-link" href="emoji.html?emoji=${encodeURIComponent(row[1])}" aria-label="Explore ${row[1]}">${row[1]}</a>`;
  $("title").textContent = prettyName(row[2]);
  $("release").textContent = `Released ${prettyDate(row[3])}`;
  document.title = `${row[0]} + ${row[1]} · Emoji Kitchen Explorer`;

  const note = noteFor(row[0],row[1]);
  if (note) {
    $("billyism").textContent = note;
    $("billyism").hidden = false;
  }

  function updateFavorite() {
    $("favorite").textContent = favorites.has(key) ? "★ Favorited" : "☆ Favorite";
  }
  updateFavorite();

  $("favorite").addEventListener("click", () => {
    favorites.has(key) ? favorites.delete(key) : favorites.add(key);
    localStorage.setItem("ek-favorites", JSON.stringify([...favorites]));
    updateFavorite();
    say(favorites.has(key) ? "Added to favorites." : "Removed from favorites.");
  });

  $("copyPair").addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(`${row[0]} + ${row[1]}`);
      say("Emoji pair copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyLink").addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(location.href);
      say("Page link copied.");
    } catch {
      say("Your browser blocked copying.", true);
    }
  });

  $("copyImage").addEventListener("click", async () => {
    try {
      if (!navigator.clipboard || !window.ClipboardItem) {
        throw new Error("Image clipboard unavailable");
      }
      const response = await fetch(row[4], {mode:"cors"});
      if (!response.ok) throw new Error("Could not fetch image");
      const blob = await response.blob();
      const pngBlob = blob.type === "image/png"
        ? blob
        : await createImageBitmap(blob).then(bitmap => {
            const canvas = document.createElement("canvas");
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            canvas.getContext("2d").drawImage(bitmap,0,0);
            return new Promise(resolve => canvas.toBlob(resolve,"image/png"));
          });
      await navigator.clipboard.write([new ClipboardItem({"image/png": pngBlob})]);
      say("Image copied. Paste it wherever images are supported.");
    } catch (error) {
      try {
        await navigator.clipboard.writeText(row[4]);
        say("Direct image copying was blocked, so the image link was copied instead.");
      } catch {
        say("Your browser blocked image copying. Press and hold the image to save or share it.", true);
      }
    }
  });

  const related = all
    .filter(other =>
      (other[0] === row[0] || other[1] === row[0] ||
       other[0] === row[1] || other[1] === row[1]) &&
      keyOf(other) !== key
    )
    .slice(0,8);

  $("relatedGrid").innerHTML = related.map(item => `
    <a class="related-item"
       href="mashup.html?left=${encodeURIComponent(item[0])}&right=${encodeURIComponent(item[1])}">
      <img loading="lazy" src="${item[4]}" alt="${item[0]} plus ${item[1]} mashup">
      <div>${item[0]} + ${item[1]}</div>
    </a>
  `).join("");

  $("loading").hidden = true;
  $("content").hidden = false;
})();
</script>
</body>
</html>
