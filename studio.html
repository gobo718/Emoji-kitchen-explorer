<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#080817"><title>Blurblet Studio · Billy Labs</title><link rel="stylesheet" href="profile.css"><style>
body{padding-bottom:90px}.studio{max-width:860px;margin:auto}.creator{display:grid;grid-template-columns:minmax(260px,1fr) minmax(260px,1fr);gap:18px}.preview{min-height:370px;border-radius:28px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 22px 60px #0008}.preview textarea{width:100%;min-height:160px;resize:vertical;border:0;background:transparent;color:inherit;font:800 1.35rem/1.45 Georgia,serif;outline:none}.mashup-note{align-self:flex-end;padding:9px 12px;background:#ffe76a;color:#2e2713;transform:rotate(-2deg);border-radius:3px;font-weight:900}.reactions{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.reactions span{display:grid;place-items:center;padding:10px;border-radius:12px;background:#0002;font-size:1.4rem}.controls{display:grid;gap:12px}.controls label{display:grid;gap:6px;color:var(--muted);font-weight:800}.controls select,.controls input,.controls button{min-height:46px;border:1px solid var(--border);border-radius:14px;background:#17152e;color:#fff;padding:0 13px;font:inherit}.controls button{cursor:pointer;font-weight:900}.hint{color:var(--muted);line-height:1.55}@media(max-width:720px){.creator{grid-template-columns:1fr}}
</style></head><body><main class="shell studio"><header class="topbar"><a class="icon-btn" href="index.html">⌂</a><div class="brand">🎨 Blurblet Studio</div><span></span></header><section class="card"><div class="creator"><div class="preview" id="preview"><textarea id="text" maxlength="220" placeholder="Write something tiny and wonderful…"></textarea><div class="mashup-note" id="pairNote">Your Collection mashup</div><div class="reactions" id="reactionIcons"></div></div><div class="controls"><p class="hint">The Studio starts each creation with a randomized canvas, frame, font, colors, and reaction icons. Reaction icons are random-only here; a future profile preference can set your default set.</p><label>Frame<select id="frame"><option value="soft">Soft</option><option value="bold">Bold</option><option value="double">Double</option></select></label><label>Canvas<select id="canvas"><option value="paper">Paper</option><option value="night">Night</option><option value="candy">Candy</option><option value="mint">Mint</option></select></label><label>Font<select id="font"><option value="serif">Storybook</option><option value="sans">Clean</option><option value="mono">Lab Notes</option></select></label><button id="randomize" type="button">🎲 Randomize the Design</button></div></div></section></main><script>
(()=>{const $=id=>document.getElementById(id),p=new URLSearchParams(location.search);const left=p.get('left'),right=p.get('right');$('pairNote').textContent=left&&right?`${left} + ${right}`:'A mashup from your Collection';try{const draft=JSON.parse(sessionStorage.getItem('billy-studio-draft')||'null');if(draft&&draft.left===left&&draft.right===right){$('text').value=draft.text||'';if(draft.mode==='submit')document.title='Submit Blurblet · Billy Labs';}}catch{}const sets=[["😂","🧠","😍","😮","👏","💜"],["🤣","💡","🥰","🤯","🙌","✨"],["😹","🧐","💖","👀","🎉","🧪"],["😆","🤓","💕","😲","🔥","🌈"]];const canvases={paper:['#f7efd2','#30283a'],night:['#16142f','#fff'],candy:['#ffb9da','#37152a'],mint:['#bdf6df','#12352b']};function apply(){const c=$('canvas').value,[bg,fg]=canvases[c];$('preview').style.background=bg;$('preview').style.color=fg;$('preview').style.border=$('frame').value==='double'?`8px double ${fg}`:$('frame').value==='bold'?`5px solid ${fg}`:`2px solid ${fg}55`;$('text').style.fontFamily=$('font').value==='mono'?'ui-monospace,monospace':$('font').value==='sans'?'system-ui,sans-serif':'Georgia,serif'}function randomize(){for(const id of ['frame','canvas','font']){const e=$(id);e.selectedIndex=Math.floor(Math.random()*e.options.length)}$('reactionIcons').innerHTML=sets[Math.floor(Math.random()*sets.length)].map(x=>`<span>${x}</span>`).join('');apply()}['frame','canvas','font'].forEach(id=>$(id).onchange=apply);$('randomize').onclick=randomize;randomize()})();
</script><script src="bottom-nav.js?v=2.4.3a"></script></body></html>
