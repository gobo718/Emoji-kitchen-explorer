<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Billy Labs Curator</title><style>
:root{color-scheme:dark;--bg:#050613;--panel:#111428;--panel2:#1b203b;--muted:#adb2c6;--accent:#8b4cff;--good:#69e6a6;--danger:#ff7795}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#21114a,#050613 38%);color:#fff;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}.shell{width:min(1180px,calc(100% - 24px));margin:auto;padding:22px 0 70px}a{color:#c9b6ff}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}.tabs,.toolbar{display:flex;gap:9px;flex-wrap:wrap}.tabs{margin:22px 0}.tab,button,input,textarea,select{font:inherit}.tab,button{border:1px solid #ffffff18;border-radius:12px;padding:11px 14px;background:#252b4d;color:#fff;font-weight:800;cursor:pointer}.tab.active,.primary{background:linear-gradient(90deg,#6748ff,#a744ef)}.danger{background:#57283b}.grid{display:grid;grid-template-columns:minmax(270px,360px) 1fr;gap:18px}.card{background:#111428eF;border:1px solid #ffffff16;border-radius:18px;padding:18px;box-shadow:0 18px 45px #0006}.list{display:grid;gap:10px;max-height:72vh;overflow:auto}.collection{width:100%;text-align:left;background:#191e39}.collection.active{outline:2px solid #9f79ff}.collection small{display:block;color:var(--muted);margin-top:5px}.status-draft{color:#ffd67a}.status-published{color:var(--good)}label{display:grid;gap:7px;font-weight:750;margin-bottom:14px}input,textarea,select{width:100%;border:1px solid #ffffff20;background:#1a203c;color:#fff;border-radius:11px;padding:11px}textarea{resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.check{display:flex;align-items:center;gap:9px}.check input{width:auto}.members{display:grid;gap:8px;max-height:260px;overflow:auto}.member{display:flex;justify-content:space-between;gap:8px;align-items:center;background:#1a203c;border-radius:12px;padding:9px}.muted{color:var(--muted)}.notice{min-height:1.4em;color:var(--good)}.stats{display:flex;gap:12px;flex-wrap:wrap}.pill{background:#252b4d;border-radius:999px;padding:7px 10px}.hidden{display:none!important}@media(max-width:760px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style></head><body><div class="shell"><div class="top"><div><h1>🔬 Billy Labs Curator</h1><p class="muted">The museum control room. Draft privately, then publish deliberately.</p></div><a href="../index.html">← Return to Billy Labs</a></div>
<div class="tabs"><button class="tab active">Collections</button><button class="tab" disabled>Mashups</button><button class="tab" disabled>Trophies</button><button class="tab" disabled>Settings</button></div>
<div class="grid"><section class="card"><div class="toolbar"><button id="newBtn" class="primary">＋ New collection</button><button id="exportBtn">⬇ Backup</button><button id="importBtn">⬆ Import</button><input id="importFile" type="file" accept="application/json" hidden></div><p id="summary" class="muted"></p><div id="collectionList" class="list"></div></section>
<section class="card"><div id="empty"><h2>Select a collection</h2><p class="muted">Create or choose one to edit its private draft.</p></div><form id="editor" class="hidden"><div class="stats"><span class="pill" id="statePill"></span><span class="pill" id="versionPill"></span><span class="pill" id="memberPill"></span></div><h2 id="editorTitle">Collection draft</h2><div class="row"><label>Icon<input id="icon" maxlength="12"></label><label>Permanent ID<input id="collectionId" readonly></label></div><label>Name<input id="name" required></label><label>Description<textarea id="description" rows="3"></textarea></label><div class="row"><label>Tier<select id="tier"><option>standard</option><option>featured</option><option>rare</option><option>mythic</option></select></label><label>Points<input id="points" type="number" min="0" step="1"></label></div><div class="row"><label>Sort order<input id="sortOrder" type="number" step="1"></label><label>Banner reference<input id="banner" placeholder="Optional image/file reference"></label></div><label class="check"><input id="secret" type="checkbox"> Secret exhibit</label><label>Private curator notes<textarea id="notes" rows="4"></textarea></label><h3>Draft members</h3><div id="members" class="members"></div><div class="toolbar"><button type="submit" class="primary">💾 Save draft</button><button type="button" id="publishBtn">🚪 Publish draft</button><button type="button" id="duplicateBtn">⧉ Duplicate</button><button type="button" id="deleteBtn" class="danger">Delete</button></div><p id="notice" class="notice" aria-live="polite"></p></form></section></div></div>
<script src="../mashup-core.js"></script><script src="../billy-storage.js"></script><script src="../billy-storage-adapters.js?v=2.2.1"></script><script src="../curator-data.js"></script><script src="../collections-data.js"></script><script src="../billy-repositories.js?v=2.2.1"></script><script>
(()=>{const $=id=>document.getElementById(id);let rows=BillyCollections.list(),selected=null;const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function persist(){BillyCollections.save(rows)} function current(){return rows.find(x=>x.id===selected)}
function renderList(){rows.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)||a.name.localeCompare(b.name));$('summary').textContent=`${rows.length} collection${rows.length===1?'':'s'} · ${rows.filter(x=>x.status==='published').length} published`;$('collectionList').innerHTML=rows.map(c=>`<button class="collection ${c.id===selected?'active':''}" data-id="${esc(c.id)}"><strong>${esc(c.icon)} ${esc(c.name)}</strong><small class="status-${c.status}">${c.status==='published'?`Published v${c.publishedVersion}`:'Draft only'} · ${(c.draft?.members||[]).length} draft members</small></button>`).join('');document.querySelectorAll('.collection').forEach(b=>b.onclick=()=>{selected=b.dataset.id;renderList();renderEditor()})}
function renderEditor(){const c=current();$('empty').classList.toggle('hidden',!!c);$('editor').classList.toggle('hidden',!c);if(!c)return;$('editorTitle').textContent=`${c.icon} ${c.name}`;$('statePill').textContent=c.status==='published'?'Published + editable draft':'Unpublished draft';$('versionPill').textContent=`Public version ${c.publishedVersion||0}`;$('memberPill').textContent=`${(c.draft?.members||[]).length} members`;['icon','name','description','tier','points','sortOrder','banner','notes'].forEach(k=>$(k).value=c[k]??'');$('collectionId').value=c.id;$('secret').checked=!!c.secret;const members=c.draft?.members||[];$('members').innerHTML=members.length?members.map(id=>`<div class="member"><span>${esc(id.split('|').join(' + '))}</span><button type="button" data-member="${esc(id)}">Remove</button></div>`).join(''):'<p class="muted">No mashups yet. Add them from a mashup page; the current mashup becomes the first member when creating a collection there.</p>';document.querySelectorAll('[data-member]').forEach(b=>b.onclick=()=>{c.draft.members=c.draft.members.filter(x=>x!==b.dataset.member);c.updatedAt=new Date().toISOString();persist();renderEditor();renderList()})}
$('newBtn').onclick=()=>{const c=BillyCollections.blank();rows.push(c);selected=c.id;persist();renderList();renderEditor()};$('editor').onsubmit=e=>{e.preventDefault();const c=current();['icon','name','description','tier','banner','notes'].forEach(k=>c[k]=$(k).value.trim());c.points=Number($('points').value)||0;c.sortOrder=Number($('sortOrder').value)||0;c.secret=$('secret').checked;c.updatedAt=new Date().toISOString();persist();$('notice').textContent='Draft saved. The public collection was not changed.';renderList();renderEditor()};
$('publishBtn').onclick=()=>{const c=current();if(!confirm(`Publish the current draft of ${c.name}?`))return;c.publishedVersion=(c.publishedVersion||0)+1;c.published={...c,members:[...(c.draft?.members||[])],publishedAt:new Date().toISOString()};delete c.published.published;delete c.published.draft;c.status='published';c.updatedAt=new Date().toISOString();persist();renderList();renderEditor();$('notice').textContent=`Published version ${c.publishedVersion}. Future edits remain private until the next publish.`};
$('duplicateBtn').onclick=()=>{const c=current(),copy=JSON.parse(JSON.stringify(c));copy.id=`${BillyCollections.slug(c.name)}-${Date.now().toString(36)}`;copy.name=`${c.name} Copy`;copy.status='draft';copy.publishedVersion=0;copy.published=null;copy.createdAt=copy.updatedAt=new Date().toISOString();rows.push(copy);selected=copy.id;persist();renderList();renderEditor()};$('deleteBtn').onclick=()=>{const c=current();if(confirm(`Delete ${c.name}?`)){rows=rows.filter(x=>x.id!==c.id);selected=null;persist();renderList();renderEditor()}};
$('exportBtn').onclick=()=>{const data={project:'Billy Labs',projectVersion:'2.2.4',formatVersion:2,exportedAt:new Date().toISOString(),collections:rows,curatorEntries:BillyCuratorData.list(),progress:window.BillyProgress?.snapshot?.()||null};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download=`BillyLabs-v2.2.4-CuratorBackup-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=async e=>{try{const data=JSON.parse(await e.target.files[0].text());if(!Array.isArray(data.collections))throw Error();const mode=confirm(`Import ${data.collections.length} collections. OK = replace, Cancel = merge.`)?'replace':'merge';rows=mode==='replace'?data.collections:[...rows,...data.collections.filter(n=>!rows.some(c=>c.id===n.id))];persist();selected=null;renderList();renderEditor()}catch{alert('That is not a valid Billy Labs collection backup.')}e.target.value=''};renderList();renderEditor()})();
</script></body></html>
