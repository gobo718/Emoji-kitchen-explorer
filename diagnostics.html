<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Billy Labs Diagnostics</title><style>body{font-family:system-ui,sans-serif;max-width:760px;margin:auto;padding:28px;background:#111;color:#f5f5f5}a{color:#c9a7ff}.card{background:#1d1d1d;border:1px solid #3a3a3a;border-radius:16px;padding:18px;margin:14px 0}.row{display:flex;justify-content:space-between;gap:20px;padding:7px 0;border-bottom:1px solid #333}.row:last-child{border:0}code{overflow-wrap:anywhere}button{padding:10px 14px;border-radius:10px;border:0;font-weight:700}</style></head><body><h1>🧪 Billy Labs Diagnostics</h1><p><a href="index.html">← Back to Billy Labs</a></p><div class="card"><div class="row"><strong>App version</strong><span>v2.4.0</span></div><div class="row"><strong>API mode</strong><span id="mode">Checking…</span></div><div class="row"><strong>API base</strong><code id="base">—</code></div><div class="row"><strong>Worker</strong><span id="worker">Not checked</span></div><div class="row"><strong>D1</strong><span id="d1">Not checked</span></div></div><div class="card"><h2>Anonymous device identity</h2><div class="row"><strong>Device ID</strong><code id="device">—</code></div><div class="row"><strong>Registration</strong><span id="registration">Local only</span></div><div class="row"><strong>Last registration</strong><span id="lastRegistration">Never</span></div><button id="register">Register Device</button></div><div class="card"><h2>Sync repositories</h2><div class="row"><strong>Queued batches</strong><span id="queue">0</span></div><div id="sync"></div></div><button id="check">Check Worker</button><script src="billy-storage.js?v=2.1.2"></script><script src="billy-device-identity.js?v=2.2.7"></script><script src="billy-storage-adapters.js?v=2.2.1"></script><script src="progress-engine.js"></script><script src="billy-cloud-config.js?v=2.2.9"></script><script src="billy-cloud-api.js?v=2.2.9"></script><script src="billy-sync-manager.js?v=2.2.7"></script><script src="billy-repositories.js?v=2.2.7"></script><script>
const $=id=>document.getElementById(id);function render(){const api=window.BillyCloudApi,m=window.BillySyncManager;$('mode').textContent=api?.isConfigured()?'Cloud configured':'Local only / sync disabled';$('base').textContent=api?.getBaseUrl()||'Not configured';const d=window.BillyDeviceIdentity?.ensure?.();$('device').textContent=window.BillyDeviceIdentity?.getMaskedId?.()||'Unavailable';$('registration').textContent=d?.registeredAt?'Registered':'Local only';$('lastRegistration').textContent=d?.lastRegistrationAt||'Never';$('queue').textContent=m.getQueueLength?.()||0;$('sync').innerHTML=m.list().map(x=>`<div class="row"><strong>${x.name}</strong><span>${x.state}</span></div>`).join('')||'<p>No sync repositories registered.</p>'}async function check(){if(!BillyCloudApi.isConfigured()){ $('worker').textContent='API not configured';$('d1').textContent='Unknown';return;}try{const h=await BillyCloudApi.health();$('worker').textContent=`Reachable · v${h.version}`;$('d1').textContent=h.storage==='d1-bound'?`Bound · schema ${h.schemaVersion}`:'Not bound';}catch(e){$('worker').textContent='Unreachable';$('d1').textContent='Unknown';}}$('check').onclick=check;$('register').onclick=async()=>{try{await BillyDeviceIdentity.register();render();}catch(e){$('registration').textContent=e.message;}};render();</script><script src="bottom-nav.js?v=2.4.2"></script>
</body></html>
