<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#080812">
<meta name="color-scheme" content="dark">
<title>Collection · Billy Labs</title>
<style>
:root{color-scheme:dark;--bg:#070711;--panel:#17142b;--panel2:#211c3b;--text:#fff9ff;--muted:#c4b8cd;--pink:#ff65a7;--purple:#8d64ff;--blue:#55baff;--gold:#ffd66b;--border:rgba(232,218,255,.16);--shadow:0 18px 45px rgba(0,0,0,.34)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 0,rgba(141,100,255,.2),transparent 34rem),radial-gradient(circle at 92% 10%,rgba(255,101,167,.15),transparent 30rem),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit}.shell{width:min(1180px,calc(100% - 28px));margin:auto;padding:22px 0 68px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;font-weight:950}.brand-mark{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--pink),var(--blue));box-shadow:var(--shadow)}.version{color:var(--muted);font-size:.8rem;font-weight:800}.hero{margin-top:24px;padding:clamp(24px,5vw,48px);border:1px solid var(--border);border-radius:30px;background:linear-gradient(145deg,rgba(34,28,68,.98),rgba(14,14,31,.97));box-shadow:var(--shadow)}.eyebrow{text-transform:uppercase;letter-spacing:.15em;color:#d0bdff;font-size:.78rem;font-weight:950}.hero h1{font-size:clamp(2.7rem,9vw,6.2rem);line-height:.92;margin:10px 0 15px}.hero p{max-width:68ch;color:var(--muted);font-size:1.05rem;line-height:1.65}.progress-wrap{margin-top:26px}.progress-copy{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:9px}.progress-copy strong{font-size:1.4rem}.progress-copy span{color:var(--muted);font-weight:800}.progress{height:16px;border-radius:999px;overflow:hidden;background:#0d0c19;border:1px solid var(--border)}.progress>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--pink),var(--gold));border-radius:inherit;transition:width .35s ease}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:18px}.stat{padding:16px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--border)}.stat strong{font-size:1.4rem;display:block}.stat span{display:block;color:var(--muted);font-size:.84rem;margin-top:4px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:34px 0 18px}.toolbar h2{margin:0;font-size:clamp(1.7rem,5vw,2.5rem)}.toolbar p{margin:5px 0 0;color:var(--muted)}.view-toggle{display:inline-flex;align-items:center;gap:10px;min-height:46px;padding:0 14px;border:1px solid var(--border);border-radius:15px;background:var(--panel);font-weight:900;cursor:pointer;white-space:nowrap}.view-toggle input{width:19px;height:19px;accent-color:var(--purple)}.toolbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.search{min-height:46px;width:min(330px,100%);border-radius:15px;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:0 15px;font:inherit}.category{margin-top:30px}.category-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.category-head h3{margin:0;font-size:1.3rem}.category-head span{color:var(--muted);font-size:.84rem}.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:11px}.emoji-card{position:relative;display:block;text-decoration:none;text-align:center;padding:17px 8px 14px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(160deg,rgba(35,29,64,.98),rgba(17,16,33,.98));transition:transform .16s ease,border-color .16s ease}.emoji-card:hover,.emoji-card:focus-visible{transform:translateY(-3px);border-color:rgba(141,100,255,.85)}.emoji-card.complete{border-color:rgba(255,214,107,.58);box-shadow:inset 0 0 22px rgba(255,214,107,.08)}.emoji-card .glyph{font-size:3.1rem;line-height:1.1}.emoji-card .name{font-size:.77rem;font-weight:900;line-height:1.2;margin-top:8px;min-height:1.85em}.mini-progress{height:5px;background:#0b0a14;border-radius:99px;margin:10px 5px 6px;overflow:hidden}.mini-progress span{display:block;height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:inherit}.complete .mini-progress span{background:var(--gold)}.count{font-size:.72rem;color:var(--muted);font-weight:800}.complete-mark{position:absolute;right:7px;top:7px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:#332500;font-size:.75rem;font-weight:1000}.detail-head{display:flex;align-items:center;gap:20px}.detail-glyph{font-size:clamp(5rem,18vw,10rem);line-height:1}.detail-copy h1{font-size:clamp(2.3rem,8vw,5rem);margin:0 0 8px}.back{display:inline-flex;margin-top:22px;color:var(--muted);font-weight:900;text-decoration:none}.mashup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}.mashup-card{display:block;position:relative;text-decoration:none;border:1px solid var(--border);border-radius:23px;overflow:hidden;background:var(--panel);transition:transform .16s ease,border-color .16s ease}.mashup-card:hover,.mashup-card:focus-visible{transform:translateY(-3px);border-color:rgba(141,100,255,.85)}.mashup-card .art{aspect-ratio:1;display:grid;place-items:center;padding:16px;background:radial-gradient(circle,rgba(141,100,255,.14),transparent 68%)}.mashup-card img{max-width:100%;max-height:100%;object-fit:contain}.mashup-card .copy{padding:13px}.pair{font-size:1.55rem;font-weight:950}.mashup-name{font-size:.78rem;color:var(--muted);margin-top:5px;line-height:1.3}.unknown{cursor:default;background:linear-gradient(145deg,#171526,#100f1c)}.unknown .art{font-size:4rem;color:#746b83;filter:none}.unknown .copy{opacity:.7}.unknown .pair{letter-spacing:.08em;color:#8e849a}.found-tag{position:absolute;right:10px;top:10px;background:rgba(8,8,18,.78);border:1px solid var(--border);border-radius:999px;padding:5px 8px;font-size:.7rem;font-weight:950}.empty{padding:30px;border:1px dashed var(--border);border-radius:20px;color:var(--muted)}footer{margin-top:48px;text-align:center;color:var(--muted);border-top:1px solid var(--border);padding-top:24px}@media(max-width:700px){.toolbar-actions{width:100%}.view-toggle{flex:1;justify-content:center}.stats{grid-template-columns:1fr}.toolbar{align-items:stretch;flex-direction:column}.search{width:100%}.emoji-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.emoji-card{padding:13px 5px 11px}.emoji-card .glyph{font-size:2.5rem}.emoji-card .name{display:none}.detail-head{align-items:flex-start;flex-direction:column;gap:8px}.mashup-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.mashup-card .copy{padding:10px}.pair{font-size:1.22rem}}@media(max-width:390px){.emoji-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
.target-mashup{outline:3px solid #ffe66d;box-shadow:0 0 0 7px rgba(255,230,109,.18),0 18px 45px #0008;animation:targetPulse 1.4s ease 2}@keyframes targetPulse{50%{transform:scale(1.025)}}
</style>
</head>
<body>
<div class="shell">
<div class="topbar"><a class="brand" href="index.html"><span class="brand-mark">🧪</span><span>Billy Labs</span></a><span class="version">v2.6.2</span></div>
<main id="app"><div class="empty">Opening your Collection…</div></main>
<footer>Billy Labs ✨<br>Every discovery belongs somewhere.</footer>
</div>
<script src="emoji-data.js?v=2.0.1"></script>
<script src="emoji-metadata.js?v=2.0.1"></script>
<script src="mashup-core.js?v=2.0.1"></script>
<script src="mashup-search.js?v=2.5.3"></script>
<script src="billy-storage.js?v=2.1.2"></script><script src="billy-device-identity.js?v=2.2.7"></script><script src="billy-storage-adapters.js?v=2.2.1"></script>
<script src="published-curator-data.js?v=2.1.3"></script>
<script src="curator-data.js?v=2.1.3"></script>
<script src="progress-engine.js?v=2.1.2"></script>
<script src="billy-cloud-config.js?v=2.2.9"></script><script src="billy-cloud-api.js?v=2.2.9"></script><script src="billy-repositories.js?v=2.2.4"></script>
<script>
(()=>{
 const all=window.EMOJI_KITCHEN_DATA||[], meta=window.EMOJI_PROFILE_METADATA||{}, seen=window.BillyProgress?.getSeen?.()||new Set(), app=document.getElementById('app');
 const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
 const categoryOrder=['Smileys & Emotion','People & Body','Animals & Nature','Food & Drink','Travel & Places','Activities','Objects','Symbols','Flags'];
 const subgroupOrder=['Face Smiling','Face Affection','Face Tongue','Face Hand','Face Neutral Skeptical','Face Sleepy','Face Unwell','Face Hat','Face Glasses','Face Concerned','Face Negative','Face Costume','Cat Face','Monkey Face','Emotion','Hand Fingers Open','Hand Fingers Partial','Hand Single Finger','Hand Fingers Closed','Hands','Hand Prop','Body Parts','Person','Person Gesture','Person Role','Person Fantasy','Person Activity','Person Sport','Person Resting','Family','Person Symbol','Skin Tone','Hair Style','Animal Mammal','Animal Bird','Animal Amphibian','Animal Reptile','Animal Marine','Animal Bug','Plant Flower','Plant Other','Food Fruit','Food Vegetable','Food Prepared','Food Asian','Food Marine','Food Sweet','Drink','Dishware','Place Map','Place Geographic','Place Building','Place Religious','Place Other','Transport Ground','Transport Water','Transport Air','Hotel','Time','Sky & Weather','Event','Award Medal','Sport','Game','Arts & Crafts','Clothing','Sound','Music','Musical Instrument','Phone','Computer','Light & Video','Book Paper','Money','Mail','Writing','Office','Lock','Tool','Science','Medical','Household','Other Object','Transport Sign','Warning','Arrow','Religion','Zodiac','Av Symbol','Gender','Math','Punctuation','Currency','Other Symbol','Keycap','Alphanum','Geometric','Flag','Country Flag','Subdivision Flag'];
 const categoryRank=new Map(categoryOrder.map((x,i)=>[x,i])), subgroupRank=new Map(subgroupOrder.map((x,i)=>[x,i]));
 const rowsByEmoji=new Map(), uniqueIds=new Set();
 all.forEach(row=>{const id=BillyMashups.id(row[0],row[1]);uniqueIds.add(id);for(const e of new Set([row[0],row[1]])){if(!rowsByEmoji.has(e))rowsByEmoji.set(e,new Map());if(!rowsByEmoji.get(e).has(id))rowsByEmoji.get(e).set(id,row);}});
 const emojis=[...rowsByEmoji.keys()].map((emoji,index)=>({emoji,index,meta:meta[emoji]||{},rows:[...rowsByEmoji.get(emoji).values()]}));
 emojis.forEach(x=>{x.found=x.rows.filter(r=>seen.has(BillyMashups.id(r[0],r[1]))).length;x.total=x.rows.length;x.percent=x.total?x.found/x.total*100:0;});
 emojis.sort((a,b)=>(categoryRank.get(a.meta.category)??99)-(categoryRank.get(b.meta.category)??99)||(subgroupRank.get(a.meta.subgroup)??999)-(subgroupRank.get(b.meta.subgroup)??999)||a.index-b.index);
 const totalFound=[...uniqueIds].filter(id=>seen.has(id)).length, overall=uniqueIds.size?totalFound/uniqueIds.size*100:0;
 const params=new URLSearchParams(location.search), selected=params.get('emoji'), targetPair=params.get('pair')||'';
 function nameOf(e){return meta[e]?.name||e;}
 function overview(){
   const groups=new Map();emojis.forEach(x=>{const c=x.meta.category||'Other';if(!groups.has(c))groups.set(c,[]);groups.get(c).push(x)});
   app.innerHTML=`<section class="hero"><div class="eyebrow">Billy Labs 2.1.2 · Collection View</div><h1>Collection</h1><p>Every mashup you discover fills two album pages—one for each emoji used to make it. Complete them in the familiar order of an emoji keyboard.</p><div class="progress-wrap"><div class="progress-copy"><strong>${totalFound.toLocaleString()} / ${uniqueIds.size.toLocaleString()}</strong><span>${overall.toFixed(totalFound?2:0)}% complete</span></div><div class="progress"><span style="width:${overall}%"></span></div></div><div class="stats"><div class="stat"><strong>${emojis.length.toLocaleString()}</strong><span>Emoji album pages</span></div><div class="stat"><strong>${emojis.filter(x=>x.found===x.total).length.toLocaleString()}</strong><span>Pages completed</span></div><div class="stat"><strong>${Math.max(0,uniqueIds.size-totalFound).toLocaleString()}</strong><span>Mashups still hidden</span></div></div></section><div class="toolbar"><div><h2>Your emoji shelves</h2><p>Tap an emoji to open its album page.</p></div><input id="search" class="search" type="search" placeholder="Find an emoji…" aria-label="Find an emoji"></div><div id="groups"></div>`;
   const groupsEl=document.getElementById('groups'),search=document.getElementById('search');
   function render(q=''){q=q.trim().toLowerCase();let html='';for(const [cat,items] of groups){const shown=BillySearch.searchItems(items,q,x=>`${x.emoji} ${x.meta.name||''} ${x.meta.subgroup||''}`);if(!shown.length)continue;html+=`<section class="category"><div class="category-head"><h3>${esc(cat)}</h3><span>${shown.length} emoji</span></div><div class="emoji-grid">${shown.map(x=>`<a class="emoji-card ${x.found===x.total?'complete':''}" href="collection-book.html?emoji=${encodeURIComponent(x.emoji)}" aria-label="${esc(nameOf(x.emoji))}: ${x.found} of ${x.total} discovered">${x.found===x.total?'<span class="complete-mark">✓</span>':''}<div class="glyph">${esc(x.emoji)}</div><div class="name">${esc(nameOf(x.emoji))}</div><div class="mini-progress"><span style="width:${x.percent}%"></span></div><div class="count">${x.found} / ${x.total}</div></a>`).join('')}</div></section>`}groupsEl.innerHTML=html||'<div class="empty">No emoji matched that search.</div>'}
   search.addEventListener('input',()=>render(search.value));render();
 }
 function detail(){
   const item=emojis.find(x=>x.emoji===selected);if(!item){overview();return;}const sorted=[...item.rows].sort((a,b)=>{const ao=a[0]===selected?a[1]:a[0],bo=b[0]===selected?b[1]:b[0];const ai=emojis.findIndex(x=>x.emoji===ao),bi=emojis.findIndex(x=>x.emoji===bo);return ai-bi||b[3].localeCompare(a[3])});
   document.title=`${item.emoji} ${nameOf(item.emoji)} Collection · Billy Labs`;
   const settingKey='collectionHideEmptySlots', hideEmpty=!!BillyRepositories.settings.get(settingKey,false);
   app.innerHTML=`<a class="back" href="collection-book.html">← All emoji</a><section class="hero"><div class="detail-head"><div class="detail-glyph">${esc(item.emoji)}</div><div class="detail-copy"><div class="eyebrow">Emoji album page</div><h1>${esc(nameOf(item.emoji))}</h1><p>Every known mashup involving ${esc(item.emoji)} appears here. Discovered stickers are revealed; the rest stay shrouded.</p></div></div><div class="progress-wrap"><div class="progress-copy"><strong>${item.found} / ${item.total}</strong><span>${item.percent.toFixed(item.found?1:0)}% complete</span></div><div class="progress"><span style="width:${item.percent}%"></span></div></div>${item.found===item.total?'<div class="stat" style="margin-top:16px;border-color:rgba(255,214,107,.55)"><strong>✨ Page complete!</strong><span>This emoji is ready for its future Trophy Room reward.</span></div>':''}</section><div class="toolbar"><div><h2>${esc(item.emoji)} mashups</h2><p>${item.total-item.found} still hidden.</p></div><div class="toolbar-actions"><label class="view-toggle"><input id="hideEmptySlots" type="checkbox" ${hideEmpty?'checked':''}> Hide empty slots</label></div></div><section class="mashup-grid" id="mashupGrid"></section>`;
   const toggle=document.getElementById('hideEmptySlots'),grid=document.getElementById('mashupGrid');
   function renderMashups(){const onlyFound=toggle.checked;const visible=onlyFound?sorted.filter(row=>seen.has(BillyMashups.id(row[0],row[1]))):sorted;grid.innerHTML=visible.map(row=>{const id=BillyMashups.id(row[0],row[1]),found=seen.has(id),partner=row[0]===selected?row[1]:row[0];return found?`<a class="mashup-card" id="mashup-${esc(id)}" data-pair="${esc(id)}" href="${esc(BillyMashups.buildUrl(row))}"><span class="found-tag">Discovered</span><div class="art"><img src="${esc(row[4])}" alt="${esc(row[0])} plus ${esc(row[1])} mashup" loading="lazy"></div><div class="copy"><div class="pair">${esc(item.emoji)} + ${esc(partner)}</div><div class="mashup-name">${esc(row[2].replace(/_/g,' '))}</div></div></a>`:`<div class="mashup-card unknown" aria-label="Undiscovered mashup"><div class="art">?</div><div class="copy"><div class="pair">${esc(item.emoji)} + ?</div><div class="mashup-name">Undiscovered</div></div></div>`}).join('')||(onlyFound?'<div class="empty">No discovered mashups on this page yet.</div>':'');}
   toggle.addEventListener('change',()=>{BillyRepositories.settings.set(settingKey,toggle.checked);renderMashups()});renderMashups();if(targetPair){requestAnimationFrame(()=>{const card=document.querySelector(`[data-pair="${CSS.escape(targetPair)}"]`);if(card){card.classList.add('target-mashup');card.scrollIntoView({behavior:'smooth',block:'center'});}});}
 }
 if(!all.length){app.innerHTML='<div class="empty">The Emoji Kitchen data could not be loaded.</div>';return;}selected?detail():overview();
})();
</script>
<script src="bottom-nav.js?v=2.4.2"></script>
</body>
</html>
