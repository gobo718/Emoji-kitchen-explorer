<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#6c4ad3">
<title>Emoji Kitchen Explorer</title>
<style>
:root {
  color-scheme: light dark;
  --bg:#f6f4fb; --panel:#ffffffde; --text:#1d1b20; --muted:#6e6876;
  --accent:#6c4ad3; --accent2:#efe9ff; --border:#705d8b2c; --danger:#b3261e;
}
@media (prefers-color-scheme:dark) {
  :root {
    --bg:#15121b; --panel:#241f2dea; --text:#f6f1ff; --muted:#bcb3c9;
    --accent:#bca3ff; --accent2:#34284d; --border:#ddcfff26; --danger:#ffb4ab;
  }
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:radial-gradient(circle at top, color-mix(in srgb,var(--accent) 18%,transparent),transparent 30rem),var(--bg);
  color:var(--text);
}
header {
  position:sticky; top:0; z-index:20; padding:14px 14px 12px;
  background:color-mix(in srgb,var(--bg) 89%,transparent);
  backdrop-filter:blur(18px); border-bottom:1px solid var(--border);
}
.wrap { max-width:1180px; margin:auto; }
h1 { margin:0; font-size:clamp(1.4rem,5vw,2rem); }
.subtitle { color:var(--muted); margin:3px 0 11px; font-size:.9rem; }
.metrics { display:flex; gap:7px; overflow:auto; padding-bottom:10px; scrollbar-width:none; }
.metric { white-space:nowrap; border:1px solid var(--border); border-radius:999px; padding:5px 9px; background:var(--panel); font-size:.8rem; }
.controls { display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:8px; }
input,select,button {
  min-height:43px; border:1px solid var(--border); border-radius:12px;
  font:inherit; color:var(--text); background:var(--panel);
}
input,select { padding:0 11px; min-width:0; }
button { padding:0 13px; font-weight:700; cursor:pointer; }
button.primary { background:var(--accent); color:white; border:0; }
button:disabled { opacity:.4; cursor:not-allowed; }
main { padding:14px; }
.toolbar {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin-bottom:12px; flex-wrap:wrap;
}
.page-info { font-weight:650; }
.pager { display:flex; gap:7px; }
.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:11px;
}
.card {
  position:relative; background:var(--panel); border:1px solid var(--border);
  border-radius:17px; padding:10px; text-align:center; overflow:hidden;
}
.card.seen { opacity:.72; }
.card img {
  width:100%; aspect-ratio:1; object-fit:contain; border-radius:11px;
  background:color-mix(in srgb,var(--panel) 85%,var(--accent2));
}
.rank {
  position:absolute; top:8px; left:8px; z-index:2; border:1px solid var(--border);
  background:var(--panel); border-radius:999px; padding:3px 7px;
  font-size:.7rem; font-weight:800;
}
.favorite {
  position:absolute; top:7px; right:7px; z-index:2; width:36px; height:36px;
  padding:0; border-radius:50%; font-size:1.15rem;
}
.favorite.active { background:var(--accent); color:white; }
.pair { font-size:1.22rem; margin-top:6px; }
.name { font-size:.78rem; font-weight:650; line-height:1.2; min-height:2em; margin-top:2px; }
.date { color:var(--muted); font-size:.72rem; margin-top:5px; }
.seen-btn { width:100%; min-height:35px; margin-top:8px; font-size:.76rem; }
.empty {
  text-align:center; padding:45px 15px; color:var(--muted); border:1px dashed var(--border);
  border-radius:18px;
}
footer { color:var(--muted); text-align:center; padding:25px 14px 35px; font-size:.78rem; }
.loading { padding:70px 15px; text-align:center; color:var(--muted); }
@media (max-width:590px) {
  .controls { grid-template-columns:1fr 1fr; }
  .controls input { grid-column:1/-1; }
  .grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .toolbar { align-items:flex-start; }
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>🧪 Emoji Kitchen Explorer</h1>
    <div class="subtitle">Browse every current mashup, 100 at a time.</div>
    <div class="metrics">
      <div class="metric" id="totalMetric">Loading…</div>
      <div class="metric" id="seenMetric">Seen: 0</div>
      <div class="metric" id="favoriteMetric">Favorites: 0</div>
      <div class="metric" id="dateMetric">Newest: —</div>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search emoji, name, or date…" aria-label="Search">
      <select id="sort" aria-label="Sort results">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="unseen">Unseen first</option>
        <option value="favorites">Favorites only</option>
      </select>
      <button class="primary" id="random" type="button">🎲 Surprise me</button>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="loading" class="loading">Opening the kitchen…</div>
  <section id="app" hidden>
    <div class="toolbar">
      <div>
        <div class="page-info" id="pageInfo"></div>
        <div class="subtitle" id="rangeInfo"></div>
      </div>
      <div class="pager">
        <button id="previousTop" type="button" aria-label="Previous 100">← Previous</button>
        <button id="nextTop" class="primary" type="button" aria-label="Next 100">Next →</button>
      </div>
    </div>
    <section class="grid" id="grid"></section>
    <div class="toolbar" style="margin-top:15px">
      <div class="page-info" id="pageInfoBottom"></div>
      <div class="pager">
        <button id="previousBottom" type="button">← Previous</button>
        <button id="nextBottom" class="primary" type="button">Next →</button>
      </div>
    </div>
  </section>
</main>

<footer>
  Artwork loads from Google’s public Emoji Kitchen image servers. Seen items and favorites stay on this device.
</footer>

<script src="emoji-data.js"></script>
<script>
(() => {
  const PAGE_SIZE = 100;
  const all = window.EMOJI_KITCHEN_DATA || [];
  const seen = new Set(JSON.parse(localStorage.getItem("ek-seen") || "[]"));
  const favorites = new Set(JSON.parse(localStorage.getItem("ek-favorites") || "[]"));
  let page = 0;
  let filtered = all.slice();

  const $ = id => document.getElementById(id);
  const keyOf = row => row[0] + "|" + row[1] + "|" + row[3];
  const prettyDate = s => `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const save = () => {
    localStorage.setItem("ek-seen", JSON.stringify([...seen]));
    localStorage.setItem("ek-favorites", JSON.stringify([...favorites]));
  };
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);

  function applyFilters() {
    const query = $("search").value.trim().toLowerCase();
    const sort = $("sort").value;
    filtered = all.filter(row => {
      if (sort === "favorites" && !favorites.has(keyOf(row))) return false;
      if (!query) return true;
      return `${row[0]} ${row[1]} ${row[2]} ${row[3]} ${prettyDate(row[3])}`
        .toLowerCase().includes(query);
    });
    if (sort === "oldest") filtered.reverse();
    if (sort === "unseen") {
      filtered.sort((a,b) => Number(seen.has(keyOf(a))) - Number(seen.has(keyOf(b))) || b[3].localeCompare(a[3]));
    }
    page = 0;
    render();
  }

  function updateMetrics() {
    $("totalMetric").textContent = `${all.length.toLocaleString()} mashups`;
    $("seenMetric").textContent = `Seen: ${seen.size.toLocaleString()}`;
    $("favoriteMetric").textContent = `Favorites: ${favorites.size.toLocaleString()}`;
    $("dateMetric").textContent = all.length ? `Newest: ${prettyDate(all[0][3])}` : "Newest: —";
  }

  function render() {
    const pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    page = Math.min(page, pages - 1);
    const start = page * PAGE_SIZE;
    const visible = filtered.slice(start, start + PAGE_SIZE);
    const end = start + visible.length;
    const info = `Page ${page + 1} of ${pages.toLocaleString()}`;
    const range = filtered.length
      ? `Showing ${start + 1}–${end} of ${filtered.length.toLocaleString()} results`
      : "No results";
    $("pageInfo").textContent = info;
    $("pageInfoBottom").textContent = info;
    $("rangeInfo").textContent = range;

    ["previousTop","previousBottom"].forEach(id => $(id).disabled = page === 0);
    ["nextTop","nextBottom"].forEach(id => $(id).disabled = page >= pages - 1);

    if (!visible.length) {
      $("grid").innerHTML = `<div class="empty" style="grid-column:1/-1">Nothing matched that search.</div>`;
      updateMetrics();
      return;
    }

    $("grid").innerHTML = visible.map((row, i) => {
      const key = keyOf(row);
      const isSeen = seen.has(key);
      const isFavorite = favorites.has(key);
      return `<article class="card ${isSeen ? "seen" : ""}" data-key="${escapeHtml(key)}">
        <div class="rank">#${(start + i + 1).toLocaleString()}</div>
        <button class="favorite ${isFavorite ? "active" : ""}" type="button"
          data-action="favorite" aria-label="Favorite">${isFavorite ? "★" : "☆"}</button>
        <img loading="lazy" src="${escapeHtml(row[4])}"
          alt="${escapeHtml(row[0] + " plus " + row[1] + " Emoji Kitchen mashup")}">
        <div class="pair">${escapeHtml(row[0])} + ${escapeHtml(row[1])}</div>
        <div class="name">${escapeHtml(row[2])}</div>
        <div class="date">${prettyDate(row[3])}</div>
        <button class="seen-btn" type="button" data-action="seen">${isSeen ? "✓ Seen" : "Mark as seen"}</button>
      </article>`;
    }).join("");
    updateMetrics();
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function turnPage(delta) {
    page += delta;
    render();
  }

  $("grid").addEventListener("click", event => {
    const button = event.target.closest("button[data-action]");
    if (!button) return;
    const card = button.closest(".card");
    const key = card.dataset.key;
    if (button.dataset.action === "favorite") {
      favorites.has(key) ? favorites.delete(key) : favorites.add(key);
    } else {
      seen.has(key) ? seen.delete(key) : seen.add(key);
    }
    save();
    render();
  });

  $("search").addEventListener("input", applyFilters);
  $("sort").addEventListener("change", applyFilters);
  $("random").addEventListener("click", () => {
    const source = filtered.length ? filtered : all;
    if (!source.length) return;
    const row = source[Math.floor(Math.random() * source.length)];
    $("search").value = `${row[0]} ${row[1]}`;
    $("sort").value = "newest";
    applyFilters();
  });
  ["previousTop","previousBottom"].forEach(id => $(id).addEventListener("click", () => turnPage(-1)));
  ["nextTop","nextBottom"].forEach(id => $(id).addEventListener("click", () => turnPage(1)));

  $("loading").hidden = true;
  $("app").hidden = false;
  updateMetrics();
  render();
})();
</script>
</body>
</html>
