<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#080812">
<meta name="color-scheme" content="dark">
<title>Emoji Profile · Billy Labs</title>
<style>
:root{color-scheme:dark;--bg:#050613;--panel:rgba(20,18,39,.94);--panel2:#17152e;--text:#f8f3ff;--muted:#bdb4c9;--accent:#8b5cff;--accent2:#ff68aa;--accent3:#40b7ff;--border:rgba(223,209,255,.16);--shadow:0 14px 35px rgba(0,0,0,.28)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0%,rgba(139,92,255,.22),transparent 32rem),radial-gradient(circle at 90% 12%,rgba(64,183,255,.14),transparent 28rem),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
a{color:inherit}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0 70px}.brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;font-weight:900;font-size:1.1rem}.brand-mark{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent2),var(--accent3));box-shadow:var(--shadow)}.back{display:inline-flex;margin:24px 0 14px;color:var(--muted);text-decoration:none;font-weight:800}.hero{display:grid;grid-template-columns:minmax(210px,330px) 1fr;gap:30px;align-items:center;padding:30px;border:1px solid var(--border);border-radius:30px;background:linear-gradient(145deg,rgba(30,25,65,.98),rgba(12,13,30,.96));box-shadow:var(--shadow)}.emoji-orb{aspect-ratio:1;border-radius:50%;display:grid;place-items:center;font-size:clamp(7rem,20vw,12rem);background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.2),transparent 25%),linear-gradient(145deg,rgba(139,92,255,.35),rgba(64,183,255,.18));border:2px solid rgba(139,92,255,.55);box-shadow:inset 0 0 0 12px rgba(255,255,255,.025),0 20px 50px rgba(0,0,0,.34)}.eyebrow{color:#c8b7ff;text-transform:uppercase;letter-spacing:.14em;font-weight:900;font-size:.78rem}.hero h1{font-size:clamp(2.2rem,7vw,4.7rem);line-height:.95;margin:10px 0 14px}.hero-emoji{margin-right:.15em}.summary{font-size:1.08rem;color:var(--muted);line-height:1.65;max-width:66ch}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:22px}.stat{padding:15px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--border)}.stat strong{display:block;font-size:1.25rem}.stat span{display:block;color:var(--muted);font-size:.86rem;margin-top:4px}.section{margin-top:34px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:16px}.section h2{font-size:clamp(1.7rem,5vw,2.35rem);margin:0}.section-head p{margin:5px 0 0;color:var(--muted)}.controls{display:flex;gap:10px;flex-wrap:wrap}.controls input,.controls select{min-height:46px;border:1px solid var(--border);border-radius:14px;padding:0 14px;background:var(--panel2);color:var(--text);font:inherit}.controls input{min-width:min(280px,80vw)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}.card{display:block;text-decoration:none;border-radius:23px;overflow:hidden;border:1px solid var(--border);background:var(--panel);transition:transform .16s ease,border-color .16s ease}.card:hover,.card:focus-visible{transform:translateY(-3px);border-color:rgba(139,92,255,.8)}.art{aspect-ratio:1;background:radial-gradient(circle at 50% 35%,rgba(139,92,255,.14),transparent 65%);display:grid;place-items:center;padding:18px}.art img{max-width:100%;max-height:100%;object-fit:contain}.card-copy{padding:15px}.pair{font-size:1.65rem;font-weight:900}.name{font-weight:850;margin-top:8px;line-height:1.28}.meta{color:var(--muted);font-size:.86rem;margin-top:8px}.related-list{display:flex;gap:10px;flex-wrap:wrap}.related-chip{display:inline-flex;align-items:center;gap:9px;text-decoration:none;padding:10px 13px;border:1px solid var(--border);border-radius:999px;background:var(--panel);font-weight:800}.related-chip .glyph{font-size:1.55rem}.empty{padding:28px;border:1px dashed var(--border);border-radius:20px;color:var(--muted)}footer{margin-top:50px;padding-top:24px;border-top:1px solid var(--border);color:var(--muted);text-align:center}@media(max-width:760px){.shell{width:min(100% - 22px,1180px)}.hero{grid-template-columns:1fr;padding:20px}.emoji-orb{width:min(76vw,320px);justify-self:center}.stats{grid-template-columns:1fr}.section-head{align-items:stretch;flex-direction:column}.controls{display:grid}.controls input{min-width:0;width:100%}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.card-copy{padding:12px}.pair{font-size:1.35rem}}
</style>
</head>
<body>
<div class="shell">
<a class="brand" href="index.html"><span class="brand-mark">✨</span><span>Billy Labs</span></a>
<a class="back" href="javascript:history.back()">← Back to the mashup</a>
<main id="loading" class="empty">Looking up that emoji…</main>
<main id="content" hidden>
<section class="hero">
  <div class="emoji-orb" id="emojiOrb"></div>
  <div>
    <div class="eyebrow">Emoji profile</div>
    <h1><span class="hero-emoji" id="heroEmoji"></span><span id="emojiName"></span></h1>
    <p class="summary" id="summary"></p>
    <div class="stats">
      <div class="stat"><strong id="comboCount"></strong><span>Emoji Kitchen mashups</span></div>
      <div class="stat"><strong id="unicodeVersion"></strong><span>Unicode version</span></div>
      <div class="stat"><strong id="firstKitchen"></strong><span>First Kitchen release here</span></div>
    </div>
  </div>
</section>
<section class="section">
  <div class="section-head">
    <div><h2>Browse combinations</h2><p id="resultsCopy"></p></div>
    <div class="controls"><input id="search" type="search" placeholder="Search these mashups…" aria-label="Search combinations"><select id="sort" aria-label="Sort combinations"><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="name">Name A–Z</option></select></div>
  </div>
  <div class="grid" id="grid"></div>
</section>
<section class="section" id="relatedSection">
  <div class="section-head"><div><h2>Frequent partners</h2><p>Other emoji that show up with this one most often.</p></div></div>
  <div class="related-list" id="relatedList"></div>
</section>
</main>
<footer>Billy Labs ✨<br>Obsessively solving problems nobody has.</footer>
</div>
<script src="emoji-data.js"></script>
<script src="emoji-metadata.js"></script>
<script>
(()=>{
 const all=window.EMOJI_KITCHEN_DATA||[];
 const profiles=window.EMOJI_PROFILE_METADATA||{};
 const $=id=>document.getElementById(id);
 const emoji=new URLSearchParams(location.search).get('emoji')||'';
 const prettyDate=s=>`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
 const titleCase=s=>s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
 const escapeHtml=s=>String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
 const rows=all.filter(r=>r[0]===emoji||r[1]===emoji);
 if(!emoji||!rows.length){$('loading').textContent='That emoji does not have any mashups in this collection yet.';return;}
 function inferredName(){
   const votes={};
   rows.forEach(r=>{const parts=r[2].split(/\s*\+\s*/);const n=r[0]===emoji?parts[0]:parts[1];if(n)votes[n]=(votes[n]||0)+1;});
   const raw=Object.entries(votes).sort((a,b)=>b[1]-a[1])[0]?.[0]||'Emoji';
   return titleCase(raw.replace(/\bheart blue\b/i,'light blue heart'));
 }
 const meta=profiles[emoji]||{};
 const name=meta.name||inferredName();
 const ordered=[...rows].sort((a,b)=>b[3].localeCompare(a[3]));
 const first=[...rows].sort((a,b)=>a[3].localeCompare(b[3]))[0][3];
 const latest=ordered[0][3];
 $('emojiOrb').textContent=emoji;$('heroEmoji').textContent=emoji;$('emojiName').textContent=name;
 $('comboCount').textContent=rows.length.toLocaleString();
 $('unicodeVersion').textContent=meta.unicodeVersion?`Unicode ${meta.unicodeVersion}`:'Research pending';
 $('firstKitchen').textContent=prettyDate(first);
 $('summary').textContent=meta.approvedDate
   ? `${name} became official with ${meta.sourceLabel||('Unicode '+meta.unicodeVersion)} on ${meta.approvedDate}. Billy Labs currently knows about ${rows.length.toLocaleString()} Emoji Kitchen combinations featuring it, ranging from ${prettyDate(first)} through ${prettyDate(latest)}.`
   : `Billy Labs currently knows about ${rows.length.toLocaleString()} Emoji Kitchen combinations featuring ${name}, ranging from ${prettyDate(first)} through ${prettyDate(latest)}. Its official Unicode history still needs research.`;
 document.title=`${emoji} ${name} · Billy Labs`;
 function render(){
   const q=$('search').value.trim().toLowerCase();
   let shown=rows.filter(r=>`${r[0]} ${r[1]} ${r[2]} ${r[3]}`.toLowerCase().includes(q));
   const sort=$('sort').value;
   shown.sort(sort==='oldest'?(a,b)=>a[3].localeCompare(b[3]):sort==='name'?(a,b)=>a[2].localeCompare(b[2]):(a,b)=>b[3].localeCompare(a[3]));
   $('resultsCopy').textContent=`Showing ${shown.length.toLocaleString()} of ${rows.length.toLocaleString()} mashups.`;
   $('grid').innerHTML=shown.length?shown.map(r=>`<a class="card" href="mashup.html?left=${encodeURIComponent(r[0])}&right=${encodeURIComponent(r[1])}"><div class="art"><img loading="lazy" src="${escapeHtml(r[4])}" alt="${escapeHtml(r[0]+' plus '+r[1]+' mashup')}"></div><div class="card-copy"><div class="pair">${escapeHtml(r[0])} + ${escapeHtml(r[1])}</div><div class="name">${escapeHtml(titleCase(r[2]))}</div><div class="meta">Released ${prettyDate(r[3])}</div></div></a>`).join(''):'<div class="empty">Nothing matched that search.</div>';
 }
 const counts={};rows.forEach(r=>{const other=r[0]===emoji?r[1]:r[0];counts[other]=(counts[other]||0)+1;});
 const related=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,14);
 $('relatedList').innerHTML=related.map(([e,count])=>`<a class="related-chip" href="emoji.html?emoji=${encodeURIComponent(e)}"><span class="glyph">${escapeHtml(e)}</span><span>${count} mashup${count===1?'':'s'}</span></a>`).join('');
 $('search').addEventListener('input',render);$('sort').addEventListener('change',render);render();
 $('loading').hidden=true;$('content').hidden=false;
})();
</script>
</body>
</html>
